  - topic: ValidationDataSet
    overview: |
      Validates the GLM-fit pipeline against two known ground-truth
      rate models — a constant-rate Poisson process and a piecewise-
      rate process — by simulating, fitting, and checking that AIC
      and KS pick the correct model.
    goal: |
      Show that the toolbox recovers the right model on data where
      the answer is known by construction.
    figures:
      - filename: fig_001.png
        caption: |
          ISI histogram for the simulated constant-rate train, with
          the exponential reference overlaid.
        analysis: |
          Histogram should match the exponential — confirms
          simulation correctness.
      - filename: fig_002.png
        caption: |
          GLM coefficient estimate `mu` vs the true intercept used
          to simulate.
        analysis: |
          Estimate should land on the truth line within standard
          error.
      - filename: fig_003.png
        caption: |
          Fitted lambda(t) trace from `results{1}.lambda.plot` for
          the constant-rate fit.
        analysis: |
          Flat trace confirms the homogeneous model was not
          oversmoothed.
      - filename: fig_004.png
        caption: |
          Spike-time raster of the piecewise-rate simulation.
        analysis: |
          Density should jump at the piecewise breakpoints.
      - filename: fig_005.png
        caption: |
          True piecewise rate function plotted over the simulation
          window.
        analysis: |
          Reference for what the GLM has to recover.
      - filename: fig_006.png
        caption: |
          Fitted piecewise-rate lambda(t) trace from the GLM.
        analysis: |
          Fitted trace should track the step-changes in the true
          rate.
      - filename: fig_007.png
        caption: |
          `Summary.plotSummary` across all candidate models on the
          piecewise data.
        analysis: |
          The piecewise model should win on AIC and KS.
      - filename: fig_008.png
        caption: |
          Log-likelihood differences from `Summary.getDifflogLL`
          across candidate fits.
        analysis: |
          Positive values flag preferred models over the baseline.
  - topic: mEPSCAnalysis
    overview: |
      mEPSC point-process analysis: load constant-magnesium and
      washout conditions, fit homogeneous Poisson and time-varying
      GLMs, and compare with `FitResSummary`.
    goal: |
      Show the mEPSC paper-example workflow on the toolbox's
      dataset, replicating Figure 1 of the 2012 paper.
    figures:
      - filename: fig_001.png
        caption: |
          Constant-magnesium condition — homogeneous Poisson fit
          summary across the cell.
        analysis: |
          Stable rate trace with the time-rescaling KS in the band.
      - filename: fig_002.png
        caption: |
          Washout-condition raster of mEPSC event times across the
          recording.
        analysis: |
          Look for rate elevation under washout vs the constant
          condition.
      - filename: fig_003.png
        caption: |
          Washout `plotResults` panel — fitted rate, KS plot, and
          coefficient errorbars.
        analysis: |
          KS deviation flags the homogeneous model as inadequate
          under washout.
      - filename: fig_004.png
        caption: |
          Washout `Summary.plotSummary` bar chart across competing
          rate models.
        analysis: |
          The time-varying model should beat the homogeneous one.
  - topic: nSTATPaperExamples
    overview: |
      One-stop replication of every figure in the 2012 paper —
      Experiments 1 through 6 covering mEPSC analysis, whisker GLMs,
      PSTH estimation, gamma-state inference, place-cell fields,
      decoding, and the hybrid filter — driven by
      `run_experiment1` through `run_experiment6`.
    goal: |
      Reproduce all 30 published paper figures with the Python port,
      matching the MATLAB `nSTATPaperExamples` ordering.
    figures:
      - filename: fig_001.png
        caption: |
          Experiment 1 — constant-Mg homogeneous Poisson fit; rate
          trace pinned at about 9.23 Hz across the 60 s recording.
        analysis: |
          Flat line confirms the stationary fit on the
          constant-magnesium condition.
      - filename: fig_002.png
        caption: |
          Experiment 1 — washout raster and per-second rate trace.
        analysis: |
          Look for the rate rise after washout onset.
      - filename: fig_003.png
        caption: |
          Experiment 1 — KS plot for the constant-Mg fit.
        analysis: |
          Trace inside the 95% band supports the homogeneous model.
      - filename: fig_004.png
        caption: |
          Experiment 1 — autocorrelation function of the rescaled
          ISIs.
        analysis: |
          Bars should sit inside the white-noise band; departures
          flag missed structure.
      - filename: fig_005.png
        caption: |
          Experiment 1 — model summary bar chart across the
          competing rate models.
        analysis: |
          Identifies the preferred model by AIC and KS.
      - filename: fig_006.png
        caption: |
          Experiment 2 — whisker stimulus waveform with the spike
          raster aligned beneath.
        analysis: |
          Confirms stimulus-locked firing in thalamic units.
      - filename: fig_007.png
        caption: |
          Experiment 2 — stimulus-spike cross-correlation.
        analysis: |
          Locates the lag of peak coupling for the GLM stimulus
          term.
      - filename: fig_008.png
        caption: |
          Experiment 2 — AIC and BIC bars across whisker GLM
          configurations.
        analysis: |
          The configuration with the lowest AIC is the paper's
          preferred model.
      - filename: fig_009.png
        caption: |
          Experiment 2 — KS comparison across the same configs.
        analysis: |
          Cross-check that AIC and KS agree on the winner.
      - filename: fig_010.png
        caption: |
          Experiment 2 — history-windows scan: KS, delta AIC, and
          delta BIC vs number of history lags.
        analysis: |
          The delta AIC dip near 7 windows marks the parsimonious
          history length.
      - filename: fig_011.png
        caption: |
          Experiment 2 — fitted whisker-GLM coefficients for the
          best model.
        analysis: |
          Identifies the dominant stimulus and history lags.
      - filename: fig_012.png
        caption: |
          Experiment 3 — true rate for the PSTH-estimation
          simulation.
        analysis: |
          Ground truth that the PSTH must recover.
      - filename: fig_013.png
        caption: |
          Experiment 3 — true rate vs GLM-PSTH step vs bin-count
          PSTH overlay.
        analysis: |
          GLM and bin estimates overlap exactly; both track the
          true rate.
      - filename: fig_014.png
        caption: |
          Experiment 3b — state estimates from the state-space
          gamma-process inference.
        analysis: |
          State trace should mirror the simulated regime changes.
      - filename: fig_015.png
        caption: |
          Experiment 3b — credible-interval widths over time.
        analysis: |
          Widths narrow where spikes are dense; widen on gaps.
      - filename: fig_016.png
        caption: |
          Experiment 3b — gamma-process posterior summary.
        analysis: |
          Confirms recovery of the regime-switch parameters.
      - filename: fig_017.png
        caption: |
          Experiment 4 — Animal 1 place-cell delta AIC bars
          (Gaussian minus Zernike).
        analysis: |
          Mirrors `HippocampalPlaceCellExample` fig_002 in this
          gallery.
      - filename: fig_018.png
        caption: |
          Experiment 4 — Animal 2 place-cell delta BIC bars; Cell 2
