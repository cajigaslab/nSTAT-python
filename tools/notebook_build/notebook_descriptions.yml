          Signal representation at 100 Hz — 10 ms bins.
        analysis: |
          Fine view; preserves most ISI structure.
      - filename: fig_004.png
        caption: |
          Signal representation at the maximum binary bin rate (one
          spike per bin).
        analysis: |
          Used as the design-matrix input for GLM fitting.
