        analysis: |
          Tracks the true px trace.
      - filename: fig_005.png
        caption: |
          Decoded 2D trajectories vs ground truth in (px, py)
          space.
        analysis: |
          Decoded path should trace the true path; gaps highlight
          where the population cannot disambiguate.
      - filename: fig_006.png
        caption: |
          Decode RMSE summary across cells and dimensions.
        analysis: |
          Lower values indicate which dimension is easier to recover.
