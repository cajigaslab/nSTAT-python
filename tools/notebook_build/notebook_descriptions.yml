  - topic: nSpikeTrainExamples
    overview: |
      Build and manipulate single `nspikeTrain` objects — construction,
      plotting, time-window cropping, and sample-rate-aware
      conversions to binary `SignalObj` representations. Mirrors the
      MATLAB `nSpikeTrainExamples` helpfile.
    goal: |
      Document the single-spike-train container and its three
      signal-representation paths.
    figures:
      - filename: fig_001.png
