  - topic: ConfidenceIntervalOverview
    overview: |
      Walks through the `ConfidenceInterval` class — construction
      from `(time, [lower, upper])`, the `lower` and `upper`
      accessors, and how it composes with `SignalObj` plots. Mirrors
      the MATLAB help page for the class.
    goal: |
      Document the simple two-bound time-series container used to
      attach confidence bands to fitted signals.
    figures: []
  - topic: FitResultReference
    overview: |
      Tracker-only scaffold for the MATLAB `FitResultReference`
      helpfile. Records the intended figure ordering for parity
      audits and does not render plots. Use the executable
      `FitResult` snippets under `examples/paper/` for hands-on use.
    goal: |
      Document the MATLAB figure sequence so the notebook fidelity
      audit can compare Python output against the reference.
    figures: []
  - topic: HybridFilterExample
    overview: |
      Hybrid (movement / no-movement) state-space decoding of a
      simulated arm reach: 24 cells driven by position and velocity
      under a discrete movement state, run the hybrid filter once,
      then average across realizations for a stable summary.
    goal: |
      Reproduce the MATLAB `HybridFilterExample` hybrid-filter
      simulation, single-run decode, and averaged-summary figures.
    figures:
      - filename: fig_001.png
        caption: |
          Reach setup grid — reach path, neural raster, discrete
          movement state, position and velocity, population spike
          fraction, and an example cumulative spike count.
        analysis: |
          Anchors hybrid-filter inputs; reported single-run RMSE
          about 0.22 (x) and 0.17 (y) with 89.9% state accuracy.
      - filename: fig_002.png
        caption: |
          Single-run hybrid-filter result — state estimate raster,
          Pr(movement) trace, decoded movement path, decoded
          position and velocity (true black, decoded blue),
          instantaneous path error, and spike-count histogram.
        analysis: |
          Position decode is noisy on a single run but follows the
          true cosine envelope; velocity is harder to recover.
      - filename: fig_003.png
        caption: |
          Averaged-across-runs summary — average state estimate,
          average Pr(movement), averaged decoded path (collapsed
          near origin), and per-axis RMSE bars (X about 0.22,
          Y about 0.18).
        analysis: |
          Averaging shrinks the decoded path toward the centre —
          the filter has near-zero mean error but high variance.
  - topic: PlaceFieldGLMBasis
    overview: |
      Self-contained extras-module demo of `nstat.extras.spatial`:
      simulate ~600 events from a sum-of-Gaussian-bumps rate field
      via thinning, fit a tensor-product cubic B-spline Poisson GLM
      with a log-area offset, fit a basis-projected LGCP with a
      Matern-5/2 prior, and diagnose with the edge-corrected pair
      correlation function.
    goal: |
      Recover a known planar place field from sparse events and
      attach a 90% log-normal credible band.
    figures: []
  - topic: HawkesWaveAnalysis
    overview: |
      Demonstrates the spatiotemporal wave-analysis stack in
      `nstat.extras.spatial`: build a synthetic 36-electrode Hawkes
      adjacency embedding a known planar wave, compute its Bartlett
      (frequency by wave-vector) spectrum, and recover the dominant
      wave-vector peaks by greedy non-maximum suppression. The 6x6
      electrode grid is acknowledged to be coarse, undersampling the
      embedded wave.
    goal: |
      Show that the Bartlett spectrum localises a known planar wave
      vector on a small electrode grid.
    figures: []
  - topic: RealPlaceCellDecoding
    overview: |
      Narrative walkthrough of `example08_real_place_cells`: load
      Animal 1 from the figshare paper dataset, fit a 4-cell
      tensor-product B-spline Poisson GLM on the training half, refit
      a quadratic CIF per cell for the PPAF decoder, and run the
      held-out spatial pair-correlation against the inhomogeneous-
      Poisson global-rank envelope plus the population
      discrete-time-corrected rescaled-time ACF.
    goal: |
      Exercise the full `nstat.extras.spatial` encoding-to-decoding
      pipeline on real hippocampal place cells with two honest
      goodness-of-fit diagnostics.
    figures: []
  - topic: MultitypeCrossK
    overview: |
      Two-label synthetic demo of `cross_k_inhom` and
      `cross_pair_correlation` (Baddeley-Moller-Waagepetersen 2000):
      contrast an independent two-label Poisson pattern against a
      shared-parent Thomas-cluster pattern, then plot both summary
      statistics with their bivariate Poisson nulls.
    goal: |
      Show that the multitype K and g statistics detect cross-
      attraction at the cluster-kernel scale while collapsing to the
      bivariate Poisson null under independent labelling.
    figures: []
