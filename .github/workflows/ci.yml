name: test-and-build

# MANUAL-ONLY policy (GitHub Actions minute conservation).
# This matrix is expensive (~16 jobs incl. JAX installs, notebook
# execution and figure regeneration), so it no longer runs automatically
# on pull_request / push.  Validate locally with `make ci-local` before
# pushing, and trigger this suite by hand when billing minutes are
# available — via the Actions tab "Run workflow" button, or:
#   gh workflow run ci.yml --ref <branch>
on:
  workflow_dispatch:

concurrency:
  group: test-and-build-${{ github.ref }}
  cancel-in-progress: true

# Force matplotlib's non-interactive backend at the workflow level so all
# jobs run headless without per-test boilerplate.
env:
  MPLBACKEND: Agg

jobs:
  unit-lint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
      - name: Run unit tests
        run: pytest -q

  paper-gallery-artifacts:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
      - name: Regenerate paper gallery artifacts
        run: python tools/paper_examples/build_gallery.py
      - name: Fail on paper gallery drift
        run: |
          git diff --exit-code -- \
            README.md \
            docs/paper_examples.md \
            docs/figures/manifest.json \
            docs/figures/example01/README.md \
            docs/figures/example02/README.md \
            docs/figures/example03/README.md \
            docs/figures/example04/README.md \
            docs/figures/example05/README.md

  parity-report-artifacts:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
      - name: Regenerate parity report
        run: python tools/parity/build_report.py
      - name: Regenerate notebook-fidelity audit
        # Auto-detects a sibling MATLAB checkout if NSTAT_MATLAB_PATH is set;
        # otherwise emits the no-matlab branch and still drifts-checks.
        run: python tools/parity/build_notebook_fidelity_audit.py
      - name: Fail on parity drift
        run: git diff --exit-code -- \
            parity/report.md \
            parity/notebook_fidelity.yml

  docs-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          # Match deploy-docs.yml so the CI build and the published site
          # are produced by the same Python interpreter.
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
      - name: Regenerate paper gallery artifacts
        run: python tools/paper_examples/build_gallery.py
      - name: Pre-generate autosummary stubs
        # autosummary emits "stub file not found" warnings on the cold-
        # start build because stub generation and the build pass happen
        # in the same run.  Doing a warm-up build first populates
        # docs/_autosummary; the strict build below then passes clean.
        run: python -m sphinx -b html docs docs/_build/html
      - name: Build docs (strict, warnings-as-errors)
        run: python -m sphinx -W -b html docs docs/_build/html

  installer-smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
      - name: Smoke test module installer without data download
        run: python -m nstat.install --download-example-data never --no-rebuild-doc-search
      - name: Smoke test compatibility no-op flag
        run: python -m nstat.install --download-example-data never --no-rebuild-doc-search --clean-user-path-prefs

  data-integrity:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
      - name: Run dataset integrity tests
        run: pytest -q tests/test_datasets.py

  notebook-smoke:
    runs-on: ubuntu-latest
    env:
      NSTAT_DATA_DIR: ${{ github.workspace }}/.nstat_data_cache

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Cache example data
        uses: actions/cache@v5
        with:
          path: ${{ env.NSTAT_DATA_DIR }}
          key: nstat-example-data-v1
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
          python -m pip install ipykernel
          python -m ipykernel install --user --name python3 --display-name "Python 3"
      - name: Execute Python notebook smoke group
        run: python tools/notebooks/run_notebooks.py --group ci_smoke --timeout 600

  notebook-parity-core:
    runs-on: ubuntu-latest
    env:
      NSTAT_DATA_DIR: ${{ github.workspace }}/.nstat_data_cache

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Cache example data
        uses: actions/cache@v5
        with:
          path: ${{ env.NSTAT_DATA_DIR }}
          key: nstat-example-data-v1
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
          python -m pip install ipykernel
          python -m ipykernel install --user --name python3 --display-name "Python 3"
      - name: Execute Python notebook parity-core group
        run: python tools/notebooks/run_notebooks.py --group parity_core --timeout 900

  notebook-changed-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    env:
      NSTAT_DATA_DIR: ${{ github.workspace }}/.nstat_data_cache

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Cache example data
        uses: actions/cache@v5
        with:
          path: ${{ env.NSTAT_DATA_DIR }}
          key: nstat-example-data-v1
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
          python -m pip install ipykernel
          python -m ipykernel install --user --name python3 --display-name "Python 3"
      - name: Resolve changed notebook topics
        id: changed_topics
        run: |
          TOPICS=$(python tools/notebooks/changed_topics.py \
            --base-sha "${{ github.event.pull_request.base.sha }}" \
            --head-sha "${{ github.sha }}")
          echo "topics=${TOPICS}" >> "$GITHUB_OUTPUT"
          echo "Resolved notebook topics: ${TOPICS:-<none>}"
      - name: Execute changed notebook topics
        if: steps.changed_topics.outputs.topics != ''
        run: python tools/notebooks/run_notebooks.py --group full --topics "${{ steps.changed_topics.outputs.topics }}" --timeout 1200
      - name: No notebook changes detected
        if: steps.changed_topics.outputs.topics == ''
        run: echo "No changed notebook topics to execute."

  cleanroom-compliance:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
      - name: Run API surface checks
        run: pytest -q tests/test_api_surface.py tests/test_cleanroom_boundary.py

  symbol-surface-audit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
      - name: Verify audited MATLAB-facing runtime surface
        run: pytest -q tests/test_matlab_symbol_surface.py tests/test_class_fidelity_audit.py tests/test_parity_report.py

  regenerate-figures:
    runs-on: ubuntu-latest
    env:
      NSTAT_DATA_DIR: ${{ github.workspace }}/.nstat_data_cache

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Cache example data
        uses: actions/cache@v5
        with:
          path: ${{ env.NSTAT_DATA_DIR }}
          key: nstat-example-data-v1
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
      - name: Regenerate all paper figures
        run: python examples/paper/regenerate_all_figures.py
      - name: Upload regenerated figures
        uses: actions/upload-artifact@v7
        with:
          name: paper-figures
          path: docs/figures/
          retention-days: 30

  extras-functional:
    # Install [all-extras] and exercise every nstat.extras.* bridge with
    # its real backing library — the per-bridge functional tests in
    # tests/extras/test_extras_namespace.py use ``pytest.importorskip``
    # for the dep-installed path, so they're invisible under the default
    # [dev] install.  This job closes that false-safety gap by ensuring
    # at least one CI run actually exercises each bridge end-to-end.
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install package with all optional extras
        run: |
          python -m pip install --upgrade pip
          # pyspike build requires Cython at install time
          python -m pip install Cython
          python -m pip install -e ".[dev,all-extras]"
      - name: Sanity-check every bridge imports
        # Lazy-imports MUST resolve cleanly once the backing deps are installed.
        run: |
          python -c "from nstat.extras.interop.neo import to_neo_spiketrain"
          python -c "from nstat.extras.interop.pynapple import to_pynapple_ts"
          python -c "from nstat.extras.interop.nwb import read_nwb_path"
          python -c "from nstat.extras.validation.nemos_bridge import cross_validate_poisson_glm"
          python -c "from nstat.extras.validation.pykalman_bridge import cross_validate_kalman"
          python -c "from nstat.extras.metrics.spike_distances import spike_distance"
      - name: Run extras functional tests
        # The functional round-trips (test_neo_roundtrip_*, etc.) skip
        # silently under [dev]-only — here they MUST run for real.
        run: pytest -q tests/extras/ -v
      - name: Run extras example scripts end-to-end
        # tests/test_extras_examples.py invokes each demo via subprocess.
        # With [all-extras] installed, every example's run-as-main path
        # must exit 0.
        run: pytest -q tests/test_extras_examples.py -v

  extras-dynamax:
    # Dedicated job for the [dynamax] extra, which is DELIBERATELY
    # excluded from [all-extras] (JAX is ~200 MB).  Without this job the
    # state-space EM tests (tests/extras/test_dynamax_bridge.py) skip in
    # every CI run via ``pytest.importorskip`` — exactly the gap that
    # let the PP_EM/mPPCO_EM numerical bugs ship undetected.  Pinned
    # jax/jaxlib/tfp because dynamax's transitive deps drift and tfp
    # tracks jax's internal API closely.
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install package with the dynamax extra (pinned jax/tfp)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,dynamax]"
          # Pin a jax/tfp/jaxlib combo known compatible with dynamax's
          # CMGF + lgssm smoothers (tfp 0.25 tracks jax 0.4.x internals).
          python -m pip install "jax==0.4.38" "jaxlib==0.4.38" "tensorflow-probability==0.25.0"
      - name: Sanity-check the EM bridge imports
        run: |
          python -c "from nstat.extras.em.dynamax_bridge import (
            fit_linear_gaussian_em, cmgf_poisson_filter, cmgf_poisson_smoother,
            fit_point_process_em, fit_hybrid_em)"
      - name: Run dynamax EM tests for real
        # These exercise the time-varying-R RTS smoother + EM trainers;
        # they would otherwise skip under importorskip.
        run: pytest -q tests/extras/test_dynamax_bridge.py -v

  extras-clusterless:
    # Dedicated job for the [clusterless] extra (replay_trajectory_classification),
    # which is DELIBERATELY excluded from [all-extras] (JAX-heavy, ~200 MB).
    # Without this job the clusterless decoder smoke tests
    # (tests/extras/test_clusterless_bridge.py) skip in every CI run via
    # ``pytest.importorskip`` — the same gap that the extras-dynamax job
    # closes for the EM bridge.
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install package with the clusterless extra
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,clusterless]"
      - name: Sanity-check the clusterless bridge imports
        run: |
          python -c "from nstat.extras.decoding.clusterless_bridge import (
            fit_clusterless_decoder, fit_clusterless_classifier,
            ClusterlessDecoderResult, ClusterlessClassifierResult)"
      - name: Run clusterless decoding tests for real
        # Exercises the upstream ClusterlessDecoder / ClusterlessClassifier
        # via the bridge; would otherwise skip under importorskip.
        run: pytest -q tests/extras/test_clusterless_bridge.py -v
