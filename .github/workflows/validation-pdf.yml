name: validation-pdf

on:
  pull_request:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  build-validation-pdf:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev,notebooks]
          python -m pip install pyyaml nbformat nbclient reportlab pillow
      - name: Run validation visuals tests
        run: |
          pytest -q tests/test_validation_images_discovery.py tests/test_helpfile_ordinal_image_parity.py
