name: helpfile-check

# Enforce helpfile freshness — every symbol in ``nstat.__all__`` (and
# ``nstat.extras.__all__`` if present) must be mentioned in the
# hand-maintained docs (``AGENT_GUIDE.md`` for all symbols,
# ``docs/ClassDefinitions.md`` for classes).
#
# Companion to ``readme-check.yml``.  Both share the same philosophy:
# fail loudly when contributors add public API without updating the
# user-facing helpfiles.
#
# ``docs/api.rst`` is NOT checked here — it is auto-generated by
# ``sphinx.ext.autosummary`` from ``nstat.__all__``; drift is impossible.

on:
  pull_request:
    paths:
      - 'nstat/__init__.py'
      - 'nstat/**/*.py'
      - 'docs/**'
      - 'AGENT_GUIDE.md'
      - 'tools/check_helpfile_freshness.py'
      - '.github/workflows/helpfile-check.yml'
  push:
    branches: [main]
    paths:
      - 'nstat/__init__.py'
      - 'nstat/**/*.py'
      - 'docs/**'
      - 'AGENT_GUIDE.md'
      - 'tools/check_helpfile_freshness.py'
      - '.github/workflows/helpfile-check.yml'
  workflow_dispatch:

env:
  MPLBACKEND: Agg

jobs:
  helpfile-freshness:
    name: Helpfile freshness check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package (needed for nstat.__all__ introspection)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run helpfile freshness check
        run: python tools/check_helpfile_freshness.py
