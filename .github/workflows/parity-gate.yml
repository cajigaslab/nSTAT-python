name: parity-gate

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  parity-checks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev,notebooks]
      - name: Run parity-focused tests
        run: |
          pytest -q tests/test_helpfile_ordinal_image_parity.py tests/test_validation_images_discovery.py tests/test_readme_examples_catalog.py
