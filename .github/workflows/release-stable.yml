name: release-stable

on:
  workflow_dispatch:
    inputs:
      rc_tag:
        description: "Release-candidate tag to promote (example: v1.0.0-rc3)"
        required: true
        type: string
      stable_tag:
        description: "Stable tag to create/publish (example: v1.0.0)"
        required: true
        type: string

permissions:
  contents: write
  actions: read

env:
  RC_TAG: ${{ inputs.rc_tag }}
  STABLE_TAG: ${{ inputs.stable_tag }}

jobs:
  promote:
    runs-on: ubuntu-latest
    env:
      OMP_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
      NUMEXPR_NUM_THREADS: "1"
      VECLIB_MAXIMUM_THREADS: "1"

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev,docs,notebooks]
          python -m pip install reportlab pillow pyyaml

      - name: Resolve and checkout RC commit
        run: |
          git fetch --tags
          git rev-parse "$RC_TAG"
          git checkout "$RC_TAG"
          echo "RELEASE_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Rebuild notebooks and verify clean state
        run: |
          python tools/notebooks/generate_notebooks.py
          git diff --exit-code

      - name: Hard checks (lint, typing, unit tests, docs)
        run: |
          ruff check src tests tools
          mypy src/nstat
          pytest -q
          python tools/docs/generate_help_pages.py
          sphinx-build -W -b html docs docs/_build/html

      - name: Checkout pinned MATLAB nSTAT reference
        run: |
          python tools/parity/checkout_matlab_reference.py \
            --config parity/matlab_reference.yml \
            --dest /tmp/upstream-nstat \
            --metadata-out parity/matlab_reference_checkout.json

      - name: Prepare deterministic validation images
        run: |
          python tools/parity/prepare_validation_images.py

      - name: Enforce parity and numeric drift gates
        run: |
          python tools/parity/build_parity_snapshot.py \
            --matlab-root /tmp/upstream-nstat \
            --fail-on medium
          python tools/parity/build_numeric_drift_report.py \
            --fixtures-manifest tests/parity/fixtures/matlab_gold/manifest.yml \
            --thresholds parity/numeric_drift_thresholds.yml \
            --report-out parity/numeric_drift_report.json \
            --fail-on-violation
          python tools/parity/check_functional_parity_progress.py \
            --report parity/function_example_alignment_report.json \
            --policy parity/functional_gate_policy.yml
          python tools/parity/check_example_output_spec.py \
            --report parity/function_example_alignment_report.json \
            --spec parity/example_output_spec.yml

      - name: Generate full validation PDF
        run: |
          python tools/reports/generate_validation_pdf.py \
            --repo-root "$GITHUB_WORKSPACE" \
            --matlab-help-root /tmp/upstream-nstat/helpfiles \
            --notebook-group all \
            --timeout 900 \
            --skip-command-tests \
            --parity-mode gate \
            --example-output-spec parity/example_output_spec.yml \
            --enforce-unique-images \
            --min-unique-images-per-topic 1 \
            --max-cross-topic-reuse-ratio 1.0

      - name: Resolve latest validation PDF
        id: pdf
        run: |
          latest_pdf="$(ls -1t output/pdf/*.pdf | head -n 1)"
          echo "path=${latest_pdf}" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "${latest_pdf}")" >> "$GITHUB_OUTPUT"

      - name: Create stable tag if needed
        run: |
          git fetch --tags
          if git rev-parse "$STABLE_TAG" >/dev/null 2>&1; then
            existing_sha="$(git rev-list -n 1 "$STABLE_TAG")"
            if [ "$existing_sha" != "$RELEASE_SHA" ]; then
              echo "Stable tag $STABLE_TAG already exists at $existing_sha (expected $RELEASE_SHA)."
              exit 1
            fi
            echo "Stable tag already exists at release commit."
          else
            git tag "$STABLE_TAG" "$RELEASE_SHA"
            git push origin "$STABLE_TAG"
          fi

      - name: Generate stable release notes
        run: |
          python tools/release/generate_stable_release_notes.py \
            --repo-root "$GITHUB_WORKSPACE" \
            --stable-tag "$STABLE_TAG" \
            --rc-tag "$RC_TAG" \
            --commit "$RELEASE_SHA" \
            --run-url "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            --validation-pdf "${{ steps.pdf.outputs.name }}" \
            --output release_notes.md

      - name: Publish stable release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ env.STABLE_TAG }}
          name: nSTAT-python ${{ env.STABLE_TAG }}
          bodyFile: release_notes.md
          artifacts: ${{ steps.pdf.outputs.path }}
          artifactErrorsFailBuild: true
          prerelease: false
          allowUpdates: true
