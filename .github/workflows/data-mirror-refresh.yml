name: data-mirror-refresh

on:
  workflow_dispatch:
    inputs:
      source_root:
        description: "Absolute path to MATLAB nSTAT data directory on the runner"
        required: true
        default: "/Users/iahncajigas/Library/CloudStorage/Dropbox/Research/Matlab/nSTAT_currentRelease_Local/data"
      dataset_version:
        description: "Version label for mirrored dataset (for example 20260302)"
        required: true
        default: "20260302"
      clean:
        description: "Remove existing mirror directory before sync"
        required: true
        type: boolean
        default: true
      push_changes:
        description: "Commit and push changes back to main"
        required: true
        type: boolean
        default: false

jobs:
  refresh:
    runs-on: [self-hosted, macOS]

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install minimal dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml

      - name: Run mirror workflow
        run: |
          CLEAN_FLAG=""
          if [ "${{ inputs.clean }}" = "true" ]; then
            CLEAN_FLAG="--clean"
          fi
          python tools/data_mirror/run_mirror_workflow.py \
            --source-root "${{ inputs.source_root }}" \
            --version "${{ inputs.dataset_version }}" \
            ${CLEAN_FLAG}

      - name: Data integrity check
        run: |
          python tools/data_mirror/verify_matlab_data.py \
            --manifest "data/shared/matlab_gold_${{ inputs.dataset_version }}.manifest.json" \
            --strict

      - name: Commit and push (optional)
        if: ${{ inputs.push_changes == true }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/shared data/datasets_manifest.json tools/compliance/shared_data_allowlist.yml data/README.md README.md .gitattributes
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Refresh MATLAB mirrored data ${{ inputs.dataset_version }}"
          git push origin HEAD:main
