name: deploy-docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e .[dev]

      - name: Regenerate paper gallery artifacts
        run: python tools/paper_examples/build_gallery.py

      - name: Pre-generate autosummary stubs
        # Warm-up pass populates docs/_autosummary so the strict build
        # below doesn't trip on "stub file not found" warnings.
        run: python -m sphinx -b html docs docs/_build/html

      - name: Build Sphinx docs (strict)
        run: python -m sphinx -W -b html docs docs/_build/html

      - name: Add .nojekyll marker
        run: touch docs/_build/html/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
