name: deploy-docs

# MANUAL-ONLY policy (GitHub Actions minute conservation) — see ci.yml.
# The public docs site no longer auto-deploys on every push to main;
# publish a new build by hand after merging docs changes, once minutes
# are available:
#   gh workflow run deploy-docs.yml --ref main
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e .[dev]

      - name: Regenerate paper gallery artifacts
        run: python tools/paper_examples/build_gallery.py

      - name: Pre-generate autosummary stubs
        # Warm-up pass populates docs/_autosummary so the strict build
        # below doesn't trip on "stub file not found" warnings.
        run: python -m sphinx -b html docs docs/_build/html

      - name: Build Sphinx docs (strict)
        run: python -m sphinx -W -b html docs docs/_build/html

      - name: Add .nojekyll marker
        run: touch docs/_build/html/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/_build/html

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
