name: notebook-full-fidelity

# MANUAL-ONLY policy (GitHub Actions minute conservation) — see ci.yml.
# Heavy: executes mapped MATLAB-helpfile notebooks against the figshare
# dataset.  Trigger by hand when minutes are available:
#   gh workflow run notebook-full-fidelity.yml --ref <branch>
on:
  workflow_dispatch:

concurrency:
  group: notebook-full-fidelity-${{ github.ref }}
  cancel-in-progress: true

jobs:
  helpfile-full:
    runs-on: ubuntu-latest
    env:
      NSTAT_DATA_DIR: ${{ github.workspace }}/.nstat_data_cache

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Cache example data
        uses: actions/cache@v5
        with:
          path: ${{ env.NSTAT_DATA_DIR }}
          # Cache key bumps when the figshare manifest changes upstream,
          # forcing a fresh download if the dataset version moves.
          key: nstat-example-data-${{ hashFiles('nstat/data/manifest.json') }}
          restore-keys: |
            nstat-example-data-
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
          python -m pip install ipykernel
          python -m ipykernel install --user --name python3 --display-name "Python 3"
      - name: Execute mapped MATLAB helpfile notebooks
        run: python tools/notebook_build/run_notebooks.py --group helpfile_full --timeout 1200
      - name: Rebuild docs/notebook_galleries/ galleries
        # Regenerate galleries from the just-executed notebooks (preserving the
        # committed galleries of notebooks not in this run's execution group).
        run: python tools/notebook_build/build_notebook_galleries.py --group full --skip-execute
      - name: Fail on STRUCTURAL notebook-gallery drift
        # Structural drift only: a notebook adding or removing figures is
        # meaningful and deterministic.  PNG byte re-encoding and regenerated
        # README "substantive" counts vary across matplotlib/font versions, so
        # do NOT byte-compare — figure non-emptiness and counts are enforced by
        # tests/test_notebook_gallery_figures.py instead.
        run: |
          added=$(git ls-files --others --exclude-standard -- 'docs/notebook_galleries/')
          removed=$(git diff --name-only --diff-filter=D -- 'docs/notebook_galleries/')
          if [ -n "$added$removed" ]; then
            echo "DRIFT: notebook gallery figures added/removed:" >&2
            [ -n "$added" ] && { echo "  added:"; echo "$added"; } >&2
            [ -n "$removed" ] && { echo "  removed:"; echo "$removed"; } >&2
            echo "A notebook's figure set changed — run 'make regen-notebook-galleries' and commit." >&2
            exit 1
          fi
          echo "No structural gallery drift (non-deterministic PNG bytes / README counts ignored)."
      - name: Upload regenerated galleries
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: notebook-galleries
          path: docs/notebook_galleries/
          retention-days: 30
