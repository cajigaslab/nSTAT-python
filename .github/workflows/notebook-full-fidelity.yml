name: notebook-full-fidelity

# MANUAL-ONLY policy (GitHub Actions minute conservation) — see ci.yml.
# Heavy: executes mapped MATLAB-helpfile notebooks against the figshare
# dataset.  Trigger by hand when minutes are available:
#   gh workflow run notebook-full-fidelity.yml --ref <branch>
on:
  workflow_dispatch:

concurrency:
  group: notebook-full-fidelity-${{ github.ref }}
  cancel-in-progress: true

jobs:
  helpfile-full:
    runs-on: ubuntu-latest
    env:
      NSTAT_DATA_DIR: ${{ github.workspace }}/.nstat_data_cache

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Cache example data
        uses: actions/cache@v5
        with:
          path: ${{ env.NSTAT_DATA_DIR }}
          # Cache key bumps when the figshare manifest changes upstream,
          # forcing a fresh download if the dataset version moves.
          key: nstat-example-data-${{ hashFiles('nstat/data/manifest.json') }}
          restore-keys: |
            nstat-example-data-
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
          python -m pip install ipykernel
          python -m ipykernel install --user --name python3 --display-name "Python 3"
      - name: Execute mapped MATLAB helpfile notebooks
        run: python tools/notebooks/run_notebooks.py --group helpfile_full --timeout 1200
      - name: Rebuild docs/notebooks/ galleries
        # Bytes-must-match: regenerate galleries from the just-executed
        # notebooks and fail if anything drifts.  This is the
        # workflow_dispatch-only counterpart of the paper-figure drift
        # gate in ci.yml::regenerate-figures.
        run: python tools/notebooks/build_notebook_galleries.py --group full --skip-execute
      - name: Fail on notebook-gallery drift
        run: |
          if ! git diff --quiet -- 'docs/notebooks/'; then
            echo "DRIFT: regenerated notebook galleries differ from committed:" >&2
            git --no-pager diff --stat -- 'docs/notebooks/' >&2
            echo "Run 'make regen-notebook-galleries' locally and commit." >&2
            exit 1
          fi
      - name: Upload regenerated galleries
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: notebook-galleries
          path: docs/notebooks/
          retention-days: 30
