# Pre-commit hooks for nstat-python.
#
# Install once:  pre-commit install
# Run manually:  pre-commit run --all-files
#
# These hooks are intentionally conservative — they catch trivially-
# preventable issues (trailing whitespace, broken YAML, huge file
# commits) without enforcing opinions on style.  Ruff / black / mypy are
# explicitly NOT enforced; see CLAUDE.md "Code style" section.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        exclude: '\.(svg|png|mat|h5|slxc?|mdl|ipynb)$'
      - id: end-of-file-fixer
        exclude: '\.(svg|png|mat|h5|slxc?|mdl|ipynb)$'
      - id: check-yaml
        # Allow ``!!python/...`` tags in parity yml files (none currently use them,
        # but keep the door open).
        args: [--unsafe]
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        # Reject files > 1 MB.  Forces large fixtures into LFS or
        # external data (figshare).  The current data_cache/ tracked
        # fixtures are ~70 KB and ~5 KB, well under the limit.
        args: ['--maxkb=1024']
      - id: check-merge-conflict
      - id: check-case-conflict
        # On case-insensitive macOS filesystems, both ``Foo.py`` and
        # ``foo.py`` can coexist locally but break on Linux CI.  This
        # hook catches the issue before push.
      - id: mixed-line-ending
        args: [--fix=lf]
        exclude: '\.(mdl)$'  # MATLAB .mdl files are CRLF by convention.
      - id: detect-private-key
        # Reject accidentally-committed SSH / PGP private keys.

  - repo: https://github.com/codespell-project/codespell
    rev: v2.3.0
    hooks:
      - id: codespell
        args: ['--ignore-words-list=nstat,nSTAT,inputfor,nd,fo,wo,iif']
        exclude: '(.*\.ipynb|tests/parity/fixtures/.*|notebooks/.*|.*\.mdl)$'

  # README freshness check (local hook, no external repo dependency).
  # Only runs when README.md or files the README references change —
  # so it doesn't slow down unrelated commits.  Mirrors the
  # ``readme-check.yml`` CI gate so you get the same answer locally.
  - repo: local
    hooks:
      - id: readme-link-check
        name: Check README intra-repo links + imports
        entry: python tools/check_readme_links.py
        language: system
        files: '^(README\.md|AGENT_GUIDE\.md|docs/.*|examples/.*|notebooks/.*|nstat/__init__\.py|nstat/.*\.py|pyproject\.toml|CITATION\.cff|tools/check_readme_links\.py)$'
        pass_filenames: false  # script always checks README.md
        require_serial: true

      # Helpfile freshness check — asserts every public symbol in
      # nstat.__all__ (and nstat.extras.__all__) appears in
      # AGENT_GUIDE.md, and every class also appears in
      # docs/ClassDefinitions.md.  Mirrors the helpfile-check.yml CI gate.
      - id: helpfile-freshness
        name: Check helpfile coverage of nstat.__all__
        entry: python tools/check_helpfile_freshness.py
        language: system
        files: '^(nstat/__init__\.py|nstat/extras/__init__\.py|nstat/.*\.py|docs/ClassDefinitions\.md|AGENT_GUIDE\.md|tools/check_helpfile_freshness\.py)$'
        pass_filenames: false
        require_serial: true

      # 0-based indexing convention scanner (HR2/HR3/HR4) across nstat/,
      # examples/, tools/, notebooks/.  Catches drift like the 5-round
      # CI loop we saw on PR #179 before it leaves the developer's machine.
      - id: indexing-convention
        name: 0-based indexing convention scan
        entry: python -m pytest tests/test_indexing_convention.py -q
        language: system
        files: '^(nstat/.*\.py|examples/.*\.py|tools/.*\.py|notebooks/.*\.ipynb|tests/test_indexing_convention\.py)$'
        pass_filenames: false
        require_serial: true

      # v6 iter 28: re-embed notebook figure outputs when a notebook
      # changes so the committed gallery PNGs always match the in-cell
      # display_data outputs.  Drift here is what kept tripping the
      # notebook-fidelity audit in v4 / v5.
      - id: embed-figures
        name: Re-embed notebook figure outputs (parity gate)
        entry: python tools/notebook_build/embed_figures.py --all
        language: system
        files: 'notebooks/.*\.ipynb$'
        pass_filenames: false
        require_serial: true
        description: "When a committed notebook changes, ensure its embedded figure outputs match the committed gallery PNGs."

      # v6 iter 28: regenerate the structured notebook-fidelity audit
      # whenever a notebook (or the audit harness itself) changes so the
      # committed parity/notebook_fidelity.yml never drifts out of sync.
      - id: regen-notebook-fidelity
        name: Regenerate parity/notebook_fidelity.yml (parity audit)
        entry: python tools/parity/build_notebook_fidelity_audit.py
        language: system
        files: 'notebooks/.*\.ipynb$|nstat/notebook_fidelity_audit\.py'
        pass_filenames: false
        require_serial: true
        description: "Regenerate the notebook fidelity audit when notebook structure changes."

      # v6 iter 28: keep the parity ledgers in sync.  The .yml files are
      # the source of truth; the .md files are regenerated by
      # tools/parity/render_ledger.py.  --check exits 2 if a manual edit
      # to the .md slips in without a matching .yml update.
      - id: parity-ledger-render
        name: Render parity/matlab_*.yml ledgers to .md
        entry: python tools/parity/render_ledger.py --check
        language: system
        files: '^parity/matlab_(defects|pedagogical_gaps)\.(md|yml)$|^tools/parity/render_ledger\.py$'
        pass_filenames: false
        require_serial: true
