  # now bit-equivalent.
  - name: v9_kalman_fixedIntervalSmoother
    recipe: v9_kalman_fixed_interval
    fixture: tests/parity/fixtures/matlab_gold/v9_kalman_fixedIntervalSmoother.mat
    output_field: x_uLag
    tolerance: { rtol: 1.0e-6, atol: 1.0e-10 }

  # decoding_PPHF — Point Process Hybrid Filter (multi-CIF, RNG path → Case C)
  # Tightened in v10 iter 47 — observed error is small (max_abs=6.07e-6,
  # max_rel=1.8e-5) after upstream MATLAB rebaseline; the linear branch is
  # deterministic given the inputs (no MC sampling on this output_field).
  - name: v9_PPHybridFilterLinear
    recipe: v9_pphybrid_linear
    fixture: tests/parity/fixtures/matlab_gold/v9_PPHybridFilterLinear.mat
    output_field: MU_u
    tolerance: { rtol: 1.0e-4, atol: 1.0e-5 }

  - name: v9_PPHybridFilter
    recipe: v9_pphybrid_full
    fixture: tests/parity/fixtures/matlab_gold/v9_PPHybridFilter.mat
    output_field: X
    tolerance: { rtol: 1.0e+1, atol: 1.0e+0 }

  # ===========================================================================
  # v11 iter 51A — 16 additional drift entries lifting total to 52.
  # Twelve drive newly-captured v11_*.mat fixtures (see
  # tools/parity/matlab/export_v11_gold_fixtures.m); four reuse existing
  # fixtures (fit_summary_exactness, v9_fitresult_KSPlot_data).
  # ===========================================================================

  # CIF gradient/jacobian surface (no-history poisson CIF).
  - name: v11_cif_evalGradient
    recipe: v11_cif_evalGradient
    fixture: tests/parity/fixtures/matlab_gold/v11_cif_evalGradient.mat
