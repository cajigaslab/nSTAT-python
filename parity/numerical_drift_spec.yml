  - name: v9_signalobj_integral
    recipe: v9_signalobj_integral
    fixture: tests/parity/fixtures/matlab_gold/v9_signalobj_integral.mat
    output_field: data_out
    tolerance: { rtol: 1.0e-12, atol: 1.0e-14 }

  # decoding_KF — Kalman smoother family.
  # Tightened in v10 iter 47 — atol shrunk from 1e-1 to 1e-2 after upstream
  # MATLAB rebaseline reduced observed drift (max_abs=8.5e-3, max_rel=2.6e-2);
  # rtol kept at 1e-1 since rel_err is at the limit on small-magnitude states.
  - name: v9_kalman_smoother
    recipe: v9_kalman_smoother
