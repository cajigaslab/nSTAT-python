    fixture: tests/parity/fixtures/matlab_gold/fit_summary_exactness.mat
    output_field: diffBIC
    tolerance: { rtol: 1.0e-12, atol: 1.0e-14 }

  - name: v11_fitressummary_getDifflogLL
    recipe: v11_fitressummary_getDifflogLL
    fixture: tests/parity/fixtures/matlab_gold/fit_summary_exactness.mat
    output_field: difflogLL
    tolerance: { rtol: 1.0e-12, atol: 1.0e-14 }

  # Reuses v9_fitresult_KSPlot_data — compare xAxis (deterministic axis).
  - name: v11_fitresult_ksplot_xaxis
    recipe: v11_fitresult_ksplot_xaxis
    fixture: tests/parity/fixtures/matlab_gold/v9_fitresult_KSPlot_data.mat
    output_field: xAxis
    tolerance: { rtol: 1.0e-12, atol: 1.0e-14 }
