# Per-topic code-structure exemptions for tools/parity/code_structure_diff.py.
#
# Lists MATLAB call-site names that have no direct Python equivalent and
# therefore should not count against the per-topic match score. The diff
# tool subtracts these calls from BOTH the matched MATLAB-only list and the
# total MATLAB call denominator, so an exempted call neither helps nor hurts.
#
# Categories captured here:
#   - MATLAB filesystem / path helpers (which, load, fullfile, fileparts) —
#     Python notebooks load fixtures inline or via nstat.data_manager.
#   - MATLAB handle-graphics property accessors (set, get, mesh, plot3) —
#     matplotlib uses axes.set_*() / property attribute assignment instead.
#   - MATLAB error/warning helpers (error, warning) — Python uses raise/logging.
#   - MATLAB user-variable indexing names mis-detected as calls by the
#     regex (e.g. ``b(1)``, ``yN(:)``, ``KS(j,:)``). These are local
#     variable subscripts in MATLAB, not function calls, and have no
#     Python "call" equivalent because NumPy uses ``b[0]`` syntax that
#     never reaches ast.Call.
#   - MATLAB ``glmfit`` — the Python port uses ``fit_poisson_glm`` from
#     nstat (and statsmodels under the hood); the bare name "glmfit"
#     does not appear in Python source.
#
# Keep entries narrow and per-topic; do not generalize to a global list
# without confirming the call has no Python analog anywhere in the suite.

version: 1
