  PPThinning:
    # MATLAB user-variable subscripting mis-detected as calls. The idiom
    # ``v = axis; axis([0 Tmax/4 v(3) v(4)])`` reads v(3)/v(4) as array
    # indexing of the axis-limit vector returned by axis(), not as a function
    # call. The Python port computes the limits directly and uses
    # ax.set_xlim / ax.set_ylim, so v() has no Python analog.
    - call: "v"
      reason: "MATLAB 'v=axis; axis([0 X v(3) v(4)])' idiom — v(3)/v(4) is axis-limit-vector indexing, not a call. Python uses ax.set_xlim/set_ylim with computed bounds."
    # MATLAB logical-index slicing tSpikes(tSpikes<=Tmax). The regex catches
    # the Name(...) form, but Python expresses this as ndarray[mask] which is
    # ast.Subscript, never ast.Call.
    - call: "tspikes"
      reason: "MATLAB 'tSpikes(tSpikes<=Tmax)' is logical-mask slicing, not a call; Python uses tSpikes[mask] which is ast.Subscript, not ast.Call."
    # MATLAB axis([xmin xmax ymin ymax]) — a single 4-arg call that sets both
    # x- and y-limits at once. The Python equivalent is two calls
    # (ax.set_xlim + ax.set_ylim), so there is no 1:1 mirror to score.
    - call: "axis"
      reason: "MATLAB axis([xmin xmax ymin ymax]) sets both axis limits in one call; Python uses two calls (ax.set_xlim + ax.set_ylim), no 1:1 mirror."
    # MATLAB struct() literal used at end-of-file to assemble parity-contract
    # scalars (parity.num_realizations = ...). Python uses a dict / dataclass.
    - call: "struct"
      reason: "MATLAB struct() literal for the parity-contract block; Python uses a dict, no struct() call exists."
    # MATLAB figure(N) is called once per panel; the Python port wraps every
    # new figure in a FigureTracker helper (_start_fig) whose body calls
    # __tracker.new_figure. The notebook scope sees _start_fig (not figure /
    # new_figure), so only the very first figure call structurally matches.
    - call: "figure"
      reason: "MATLAB figure(N) creates a figure with explicit handle; Python port uses _start_fig() helper that wraps __tracker.new_figure internally, so subsequent figure(N) calls have no structural mirror at cell scope."

