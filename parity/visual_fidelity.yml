  figure_description: History windows + covariate visualization
  ssim_threshold: 0.5
  stochastic: true
  notes: "After Phase 2 fix (8 hand-typed \u2192 100 seeded random spikes\nmatching ``sort(rand(1,100))``), figure scope matches\
