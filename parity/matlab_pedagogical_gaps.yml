version: 1
intro: "This file is the **counterpart** to `parity/matlab_defects.md`.  Where\ndefects.md\
  \ records places Python had to **fix** MATLAB, this file records\nplaces Python\
  \ **adds** content the MATLAB toolbox should consider adopting —\nextra figures,\
  \ extra cells, additional diagnostic plots, alternative views\nthat enrich the pedagogy\
  \ of the helpfile.\n\nPer AGENT_GUIDE.md §0:\n- Python is allowed to **extend**\
  \ beyond MATLAB (Extension rule).\n- Figure-count parity is the default; Python\
  \ surplus must be justified as a\n  pedagogical extra **or** removed.\n\nSchema\
  \ for each entry:\n\n```\n## Gap: <one-line title>\n- **Topic / helpfile:** `<TopicName>`\n\
  - **MATLAB count:** N\n- **Python count:** N + k  (k extra figures)\n- **What Python\
  \ adds:** <description of the extra figure(s)>\n- **Pedagogical justification:**\
  \ <why a learner benefits from seeing this>\n- **MATLAB upstream action:** <\"Add\
  \ equivalent figure to helpfiles/<Topic>.mlx\n  using <function call>\" — i.e. a\
  \ clear instruction the MATLAB maintainer\n  can act on>\n- **Python implementation:**\
  \ `<notebooks/<Topic>.ipynb cell <N>>` and any\n  library helpers\n- **Discovered:**\
  \ <iter # / date>\n```\n\nIf the extra is **not** pedagogically justified, the Python\
  \ notebook should\nremove the extra cell instead of recording it here.\n"
entries:
