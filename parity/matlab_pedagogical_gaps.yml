  \ following Python notebooks have more figures than MATLAB but haven't yet\nbeen\
  \ classified. Each will be **either** justified here as pedagogical\n(with an upstream\
  \ action) **or** trimmed back to MATLAB's count.\n\n| Topic | MATLAB | Python |\
  \ Δ | Status |\n|---|---:|---:|---:|---|\n| `NetworkTutorial` | 5 | 8 | +3 | resolved\
  \ (v2 iter 9 / 2026-06-18) — 5 incidental figures removed (4 scalar single-stem\
  \ filter plots and 1 empty CIF-trajectory plot); remaining +3 schematic mirrors\
  \ + 1 multi-tap kernel logged below |\n| `nSTATPaperExamples` | 29 | 29 | 0 | trimmed\
  \ (v2 iter 9 / 2026-06-18) — removed incidental \"paper dataset summary\" bar chart\
  \ (scale-mismatched, not pedagogical) |\n\n---\n\n## How to use this ledger\n\n\
  1. **When closing a parity-affecting PR:** if your work surfaced a Python\n   notebook\
