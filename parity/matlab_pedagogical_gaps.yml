- id: ppthinning-rng-driven-raster-residual
  title: PPThinning — RNG-driven raster pattern residual (figures 3 & 4)
  topic: PPThinning
  matlab_count: 4
  python_count: 4
  delta_label: '0'
  matlab_extras: 'No count delta — Python emits the same 4 figures.  The residual
    is a

    *pixel-level* visual divergence in figures 3 & 4 (20-realization

    thinning raster + sinusoidal lambda overlay) driven by the different

    random streams underlying the thinning step.  MATLAB''s classic RNG

    (Mersenne Twister with MATLAB-default state) and NumPy''s

    ``default_rng(1)`` produce different spike-time sequences from the

    same conditional intensity, so the raster fill pattern differs even

    when the overlay curve and axes match exactly.

    '
  pedagogical_impact: 'None — the figures convey the identical lesson (thinning produces
    a

    raster modulated by lambda(t)).  Density envelopes line up with the

    sine peaks/troughs in both renderings.

    '
  decision: "Accept the residual.  Builder iter-52A tested four approaches before\n\
    accepting:\n\n* **Approach A — pixel diff.**  Mean abs RGB difference at common\n\
    \  DPI ~55 (cap 255).  Almost all of this is the raster fill, not\n  the sine.\
    \  Quantified, not closeable without re-seeding.\n* **Approach B — z-order.**\
    \  Verified raster (drawn by\n  ``nstColl.plot``) goes first, lambda overlay drawn\
    \ second on the\n  same axis — matches MATLAB ``hold on`` draw order.  No change.\n\
    * **Approach C — color, capstyle, linewidth.**  Switched lambda\n  from ``'#0000ee'``\
    \ to MATLAB's true MLX-rendered ``(0,0,1)``\n  (sampled from ``PPThinning_04.png``:\
    \ dominant blue ~(10,10,243)),\n  bumped linewidth to 2.5, added ``solid_capstyle='round'``,\n\
    \  ``solid_joinstyle='round'``, explicit ``antialiased=True``.\n  Closes the sine-curve\
    \ appearance gap.\n* **Approach D — cairo backend.**  Not adopted: switching matplotlib\n\
    \  backends inside a notebook is brittle, and the gallery executor\n  forces ``agg``.\
    \  The smoother Bezier rendering cairo offers is not\n  worth the infra cost when\
    \ the sine-overlay polish (Approach C)\n  already reads as MATLAB-equivalent.\n\
    \nTwo structural fixes were also applied: (1) suppress the\n``\"Spike Train Raster\"\
    `` panel title that ``nstColl.plot`` injects\n(MATLAB has no panel title), (2)\
    \ hide numeric y-tick labels so the\nraster body — not an off-by-one row index\
    \ — is what the eye reads\n(MATLAB renders a placeholder ``\"1\"`` per row, visually\
    \ a blank\ncolumn).\n"
  matlab_upstream_action: 'None recommended — the visible divergence is a faithful
    consequence

    of the toolboxes using different RNGs.  Documenting the

    MATLAB-default ``rng`` seed alongside the helpfile would let

    reproducers regenerate the published PNG, but doesn''t affect the

    lesson.

    '
  discovered: v11 iter 52A / 2026-06-19
  resolved_iter: v11 iter 52A (accepted)
