iter_56_final_summary:
  total_paths: 10
  paths_over_5x: 0
  paths_over_2x: 2  # pp_decode_filter_linear (2.78), kalman_filter (2.27)
  paths_competitive: 8
  paths_acceptable: 2
  paths_needs_investigation: 0
  remarks: |
    Both >2x paths are bottlenecked on per-step `np.linalg.solve` Python
    dispatch over small matrices.  Closing further requires Cython/Numba
    or a batched formulation; out of v12 scope.  All other paths are
    competitive with MATLAB (<=1.5x) or faster.


# ---------------------------------------------------------------------------
# Iter 56 — open questions for iter 57
# ---------------------------------------------------------------------------

open_questions_for_iter_57:
  - |
    pp_decode_filter_linear and kalman_filter both hover at ~2.5-3x
    bottlenecked on `np.linalg.solve` overhead for small (2x2, 4x4)
    matrices.  Is a Numba JIT pass in `nstat.extras` (opt-in, not core)
    a reasonable v13 direction, or should we accept the ratios as the
    cost of pure-Python parity?
  - |
    The `history_to_filter` MATLAB analogue constructs a `tf` object
    (Control System Toolbox).  Python's `HistoryFilterBank` is a
    dataclass.  Is there a meaningful apples-to-apples MATLAB analogue
    that excludes CST object init?  The current MATLAB body times the
    whole `toFilter` including `tf()`; the ratio (0.01x) is dominated
    by CST setup, not numerical work.
  - |
    `analysis_run_for_all_neurons_10cell` ratio is 1.34x at 10 cells.
    Does it scale super-linearly with cell count (e.g. 50 cells)?
    Worth a one-off check to see if `FitResSummary` aggregation
    becomes a bottleneck at higher counts.
  - |
    The MATLAB process segfaulted once during a 5-run capture pass.
    Probably unrelated to perf_check, but worth a retry-on-segfault
    wrapper if it recurs (iter 56 worked around it by retrying with
    `--runs 3`).
