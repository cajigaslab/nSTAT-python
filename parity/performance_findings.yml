      Python-call frame would erase the iter-55 win.  Instead left
      "CAREFUL: duplicates ..." marker comments at both call sites so
      any future maths change is flagged in code review.


# ---------------------------------------------------------------------------
# Iter 56 — 5 new baseline paths (descriptions + diagnoses)
# ---------------------------------------------------------------------------

iter_56_new_paths:

  - name: analysis_run_for_all_neurons_10cell
    python_function: "nstat.analysis.Analysis.RunAnalysisForAllNeurons"
    matlab_function: "Analysis.RunAnalysisForAllNeurons"
    input_size: "10-cell ensemble, 200 spikes/cell, sin-3Hz stim, 4-window history, 5s @ 1kHz"
    py_median_sec: 0.811
    ml_median_sec: 0.606
    ratio: 1.34
    flag: competitive
    diagnosis: |
      Multi-neuron path through FitResSummary.  Scales linearly with cell
      count.  Ratio ~1.3x reflects per-neuron Python dispatch (GLM,
      computeKSStats, summary-row construction).  No single bottleneck;
      gain follows from the iter-55 _build_sigrep vectorisation.

  - name: cif_eval_lambda_delta_loop
    python_function: "nstat.cif.CIF.evalLambdaDelta"
    matlab_function: "CIF.evalLambdaDelta"
    input_size: "binomial CIF, 1000-stimulus-value loop, 2 stim vars"
    py_median_sec: 0.0021
    ml_median_sec: 0.386
    ratio: 0.01
    flag: competitive
    diagnosis: |
      Python sympy-backed `lambdify` is ~180x faster than MATLAB's
      `matlabFunction` symbolic dispatch in a tight loop.  MATLAB pays
      a steep per-call symbolic-engine overhead; Python pre-compiles
      the lambda once in __init__.  Expected; no action.

  - name: analysis_compute_ks_stats
    python_function: "nstat.analysis.Analysis.computeKSStats"
    matlab_function: "Analysis.computeKSStats"
    input_size: "200-spike train vs constant-rate lambda Covariate, 10s @ 1kHz"
    py_median_sec: 0.0077
    ml_median_sec: 0.072
    ratio: 0.11
    flag: competitive
    diagnosis: |
      Time-rescaling KS path.  Python ~9x faster than MATLAB — likely
      because the underlying nspikeTrain resample + getSigRep call
      chain hits the vectorised `_build_sigrep` from iter 55.

  - name: signal_obj_filter
    python_function: "nstat.core.SignalObj.filter"
    matlab_function: "SignalObj.filter"
    input_size: "100k-sample 1-D signal, 5th-order Butterworth lowpass"
    py_median_sec: 0.0013
    ml_median_sec: 0.0066
    ratio: 0.19
    flag: competitive
    diagnosis: |
      `scipy.signal.lfilter` outperforms MATLAB's `filter` on 100k
      samples.  Expected; SciPy is a thin C wrapper.

  - name: history_to_filter
    python_function: "nstat.history.History.toFilter"
    matlab_function: "History.toFilter"
    input_size: "4-window kernel, delta=0.001s"
    py_median_sec: 1.6e-05
    ml_median_sec: 0.0038
    ratio: 0.01
    flag: competitive
    diagnosis: |
      Python `HistoryFilterBank` is a dataclass holding numpy arrays;
      MATLAB constructs a `tf` (transfer function) object that triggers
      Control System Toolbox setup.  Apples-to-oranges by construction
      — MATLAB's overhead is the object-class init, not the filter
      coefficients themselves.  Flag as "competitive" but note the
      caveat in the input_size description.


