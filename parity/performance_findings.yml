#   - analysis_run_for_neuron     0.046s  ratio 0.20x   (unchanged from iter55)
#   - pp_decode_filter_linear     0.224s  ratio 2.78x   (~iter55, stable)
#   - kalman_filter               0.018s  ratio 2.27x   (REGRESSED from
#                                                        iter55's claimed
