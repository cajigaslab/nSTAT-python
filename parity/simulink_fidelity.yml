items:
  - model_name: PointProcessSimulation
    model_path: PointProcessSimulation.slx
    purpose: Discrete point-process simulation used by `CIF.simulateCIF`, `PPSimExample`, and related help workflows.
    matlab_usage: required_for_behavioral_parity
    python_strategy: native_python
    current_python_status: high_fidelity
    chosen_interoperability_strategy: Native Python simulation through `nstat.cif.CIF.simulateCIF`, with optional MATLAB Engine reference execution through `nstat.matlab_reference.run_point_process_reference` when MATLAB is available.
    fidelity_risks:
      - Exact stochastic spike-count realizations differ between MATLAB and NumPy random generators even when the same seed is requested.
      - The native Python path mirrors the Simulink transfer-function semantics for the published help workflows, but not every internal Simulink block configuration has a one-to-one Python analogue.
    validation_plan:
      - Compare deterministic lambda traces against MATLAB Engine reference runs when MATLAB is available.
      - Keep seeded Python regression tests for FIR filtering, recursive history terms, and PPSimExample outputs in CI.
