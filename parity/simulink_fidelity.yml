  purpose: Discrete point-process simulation used by `CIF.simulateCIF`, `PPSimExample`,
    and related help workflows.
  matlab_usage: required_for_behavioral_parity
  python_strategy: native_python
  current_python_status: high_fidelity
  deterministic_fixture_backed: true
  stochastic_tolerance_backed: true
  chosen_interoperability_strategy: Native Python simulation through `nstat.cif.CIF.simulateCIF`,
    with MATLAB-side `tests/python_port_fidelity/TestPythonSimulinkParity.m` serving
    as the cross-language reference checker.
  fidelity_risks:
  - Exact stochastic spike-count realizations differ between MATLAB and NumPy random
    generators even when the same seed is requested.
  - The native Python path mirrors the Simulink transfer-function semantics for the
    published help workflows, but not every internal Simulink block configuration
    has a one-to-one Python analogue.
  validation_plan:
  - Compare deterministic lambda traces against MATLAB-generated fixtures and the
    MATLAB-side Simulink parity harness.
  - Keep committed MATLAB gold fixtures for deterministic injected-uniform traces
    covering recursive history, eta, lambda-delta, and spike indicators, plus seeded
    Python regression tests for PPSimExample outputs in CI.
  status: high_fidelity_native_python
  python_equivalent: nstat.cif.CIF.simulateCIF
  validation_strategy: deterministic injected-uniform trace fixtures plus seeded tolerance
    checks
  required_remediation: Broaden deterministic fixture coverage to additional branch
    variants before promoting exact_native_python.
