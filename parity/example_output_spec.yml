version: 1
policy_name: example_output_spec

defaults:
  min_python_code_lines: 20
  min_python_code_cells: 1
  min_assertion_count: 2
  require_topic_checkpoint: true
  require_plot_call: true
  min_matlab_reference_images: 0
  min_python_validation_images: 1
  enforce_validation_images: true
  require_line_port_audit: true
  min_line_port_coverage: 0.0
  min_line_port_function_recall: 0.0
  allowed_strict_line_statuses:
    - line_port_verified
    - line_port_partial
    - line_port_gap
    - matlab_doc_only
    - doc_only
    - missing_artifact
    - missing_executable_content
  allowed_alignment_statuses:
    - validated
  out_of_scope_allowed_alignment_statuses:
    - validated
    - matlab_doc_only
    - doc_only

out_of_scope_topics:
  - DocumentationSetup2025b
  - FitResSummaryExamples
  - FitResultExamples
  - FitResultReference

topics:
  TrialConfigExamples:
    min_python_code_lines: 4
  ConfigCollExamples:
    min_python_code_lines: 4
  CovCollExamples:
    min_python_code_lines: 15
  EventsExamples:
    min_python_code_lines: 8
  nSpikeTrainExamples:
    min_python_code_lines: 12
  nstCollExamples:
    min_python_code_lines: 12
