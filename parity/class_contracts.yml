version: 1
description: >
  Class-level contract manifest tying MATLAB classes to Python counterparts,
  MATLAB-gold fixtures, and critical method checkpoints.

classes:
  - matlab_class: SignalObj
    python_class: nstat.signal.Signal
    compat_class: nstat.compat.matlab.SignalObj
    fixture_path: tests/parity/fixtures/matlab_gold/SignalObjExamples_gold.mat
    key_methods:
      - copy
      - resample
      - periodogram
      - get_sub_signal
      - merge

  - matlab_class: Covariate
    python_class: nstat.signal.Covariate
    compat_class: nstat.compat.matlab.Covariate
    fixture_path: tests/parity/fixtures/matlab_gold/CovCollExamples_gold.mat
    key_methods:
      - get_sub_signal
      - data_to_matrix
      - compute_mean_plus_ci
      - to_structure
      - from_structure

  - matlab_class: ConfidenceInterval
    python_class: nstat.confidence.ConfidenceInterval
