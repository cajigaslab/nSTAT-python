    method_parity: getSigRep, getSpikeTimes, getISIs, getMaxBinSizeBinary, computeRate, restoreToOriginal, nstCopy, and structure export exist. Plotting, burst-detection detail, partitioning, and several statistics/utilities are still incomplete.
    default_value_parity: Defaults and cache behavior now track MATLAB much more closely than the previous wrapper-based implementation.
    shape_and_indexing_parity: Spike vectors remain one-dimensional and time-window filtering is inclusive on both ends, matching MATLAB.
    error_warning_parity: Core argument validation exists, but warnings and all numerical corner cases are not yet matched exactly.
    output_type_parity: Signal representation returns SignalObj and rate conversion returns SignalObj as expected.
    known_semantic_differences:
