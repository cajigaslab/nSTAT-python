  - matlab_name: SignalObj
    kind: class
    matlab_path: SignalObj.m
    python_symbol: nstat.SignalObj
    python_path: nstat/core.py
    status: partial
    constructor_parity: Closer than the previous shim-first design; constructor defaults, orientation handling, labels, masks, resampling, and time-window APIs now mirror MATLAB more closely.
    property_parity: Core observable fields exist (time, data, name, xlabelval, xunits, yunits, sampleRate, originalTime, originalData, dataMask, plotProps), but not every MATLAB property or dependent behavior is implemented.
    method_parity: Foundational methods are implemented for labels, masking, sub-signals, nearest-time lookup, time-window extraction, restore/reset, mean/std, and resampling. Arithmetic, filtering, plotting, correlation, and many utility methods are still missing.
    default_value_parity: Defaults for labels and units now match MATLAB more closely, including the 1 kHz fallback when sample spacing is ill-conditioned.
    shape_and_indexing_parity: Signals use time-by-dimension storage and one-based selector behavior for MATLAB-facing methods.
    error_warning_parity: Some MATLAB-style validation is present, but warning text and all edge-case errors are not yet matched.
    output_type_parity: MATLAB-facing methods return SignalObj/Covariate instances where expected.
    known_semantic_differences:
      - Plotting and many arithmetic/operator overloads are still absent.
      - Structure serialization is only partial compared with MATLAB.
    recommended_remediation:
      - Port arithmetic, filtering, plotting, and structure round-trip methods from MATLAB.
      - Add fixture-backed tests for label masking, merge, derivative, and window semantics.
  - matlab_name: Covariate
    kind: class
    matlab_path: Covariate.m
    python_symbol: nstat.Covariate
    python_path: nstat/core.py
    status: partial
    constructor_parity: Uses the SignalObj constructor shape and supports Python aliases for values and units.
    property_parity: mu and sigma views exist; ci storage is supported.
    method_parity: copySignal, getSubSignal, computeMeanPlusCI, getSigRep, and setConfInterval exist, but arithmetic with CI propagation and full structure round-tripping are incomplete.
    default_value_parity: Mostly inherited from SignalObj.
    shape_and_indexing_parity: Time-by-dimension behavior matches SignalObj and MATLAB-facing one-based selectors are preserved.
    error_warning_parity: Basic validation is present, but not all MATLAB message paths are matched.
    output_type_parity: Covariate methods return Covariate or SignalObj as MATLAB expects for the implemented subset.
    known_semantic_differences:
      - CI-aware plus/minus operator behavior is not yet ported.
      - Plotting with confidence intervals is not yet implemented.
    recommended_remediation:
      - Port arithmetic overloads and CI plotting semantics from MATLAB.
      - Add fixture-backed tests for zero-mean and CI propagation workflows.
