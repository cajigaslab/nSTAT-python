- id: rng-stream-divergence
  title: 'RNG-stream divergence: MATLAB Mersenne Twister vs NumPy default_rng'
  defect_class: Stability (no behavioural change; intentional architectural divergence)
  matlab_location: 'Multiple paper-example scripts: `nSTATPaperExamples.m` Experiment
    5 (StimulusDecode2D) draws coefficients `coeffs = -|randn(80,5)|` and innovations
    `r = 0.01*randn(2,N)`; `TrialExamples.m:33` draws spike times via `sort(rand(1,100))*lengthTrial`.'
  matlab_behavior: 'Uses MATLAB''s Mersenne Twister via `randn`/`rand`, seeded with

    `rng(seed)`.

    '
  correct_behavior: 'Python uses `np.random.default_rng(seed)` (PCG64), the modern

    NumPy-recommended generator.  Per the porting guideline that random

    sequences need not be bit-identical across language runtimes, we do

    not try to replicate MT19937 bit-stream in Python.


    Evidence of formula equivalence: when MATLAB''s `dataMat` and

    `coeffs` are piped into the Python `_simulate_decode` formula

    `exp(eta)/(1+exp(eta))/delta`, output matches MATLAB to ~1e-13 —

    the pipeline is structurally identical; only the random draws

    differ.

    '
  python_implementation:
  - '`notebooks/StimulusDecode2D.ipynb` and `notebooks/TrialExamples.ipynb`.'
  - '`TrialExamples` previously used a deterministic quasi-uniform `np.linspace` grid
    (CV<<1); iter 14 fixed this to `np.sort(rng.uniform(0, length_trial, 100))` to
    recover the Poisson-like ISI character (CV~1) MATLAB produces.  `StimulusDecode2D`
    RNG choice is intentional and not changed.'
  fixture_impact: No `.mat` gold fixture change.
  discovered: iter 14 / 2026-06-18
- id: pplfp-em-n4-rhat-branch-mislabeled
  title: PPLFP_EM `n4` parameter-count branch uses Qhat constraints instead of Rhat
  defect_class: Bug (preserved)
  matlab_location: '`+nstat/+decoding/PPLFP.m:1936-1942` in `cajigaslab/nSTAT@2d86602`
    (function `PPLFP_EM`)'
  matlab_behavior: 'The middle branch of the `n4` (Rhat-parameter-count) cascade tests

    `PPLFP_EM_Constraints.QhatDiag==1 && QhatIsotropic==0` instead of

    the parallel `RhatDiag`/`RhatIsotropic` pair used by the matched

    `n2` branch immediately above.  When R has a non-trivial constraint

    but Q is dense, the AIC/AICc/BIC parameter count over-reports `n4`

    to `numel(Rhat)`; when Q is diagonal-non-isotropic the count

    collapses to `size(Rhat,1)` regardless of R''s actual structure.

    '
  correct_behavior: '`n4` should mirror the symmetric `n2` cascade: test

    `RhatDiag && RhatIsotropic -> 1`, else `RhatDiag -> size(R,1)`,

    else `numel(R)`.  Only Rhat''s own constraints govern the count of

    free parameters in Rhat.

    '
  python_implementation:
  - '`nstat/decoding/PPLFP.py` `PPLFP.PPLFP_EM` — `n4` branch preserves the MATLAB
    conditional verbatim with an in-line `NOTE:` comment so the AIC/BIC values agree
    with MATLAB to the bit.  A fix can be applied later if/when MATLAB upstream patches
    it.'
  fixture_impact: No `.mat` gold fixture change yet (PPLFP_EM fixtures not regenerated
    by iter 29).
  discovered: iter 29 / 2026-06-18
- id: pplfp-estep-fixture-missing
  title: PPLFP_EStep baseline .mat absent — numerical drift unverified
  defect_class: Case C (stability / tolerance relaxation)
  matlab_location: '`+nstat/+decoding/PPLFP.m:1990-2206` in `cajigaslab/nSTAT` (function
    `PPLFP_EStep`)'
  matlab_behavior: '`PPLFP_EStep` runs the PPLFP forward filter, the RTS smoother,
    and

    accumulates the sufficient statistics for the M-step (Sxkm1xkm1,

    Sxkm1xk, Sxkxk, Sykyk, Sxkyk), the linearised Gaussian terms

    (sumXkTerms, sumYkTerms), the conditional-intensity contribution

    sumPPll, and the complete-data log-likelihood lower bound `logll`.

    It contains multiple MATLAB `B/A`-style right divides over potentially

    ill-conditioned smoothed covariances, plus an unbounded `exp(terms)`

    that can overflow at extreme states.

    '
  correct_behavior: 'A `.mat` gold fixture covering `PPLFP_EStep` should be captured
    by

    seeding MATLAB''s RNG, recording all inputs (A, Q, C, R, y, alpha,

    dN, mu, beta, gamma, HkAll, x0, Px0) and the four returned objects

    (x_K, W_K, logll, and every field of ExpectationSums), then

    verifying Python against it at `rtol=1e-6, atol=1e-8` for x_K / W_K

    / Sx* / S*k* / sumXkTerms / sumYkTerms, and a relaxed `rtol=1e-4`

    for `logll` (which sums sumPPll over K and is the most numerically

    sensitive aggregate).

    '
  python_implementation:
  - '`nstat/decoding/PPLFP.py` `PPLFP.PPLFP_EStep` is a full port: filter via `PPLFP_DecodeLinear`,
    RTS smoother via `kalman_smootherFromFiltered` (with MATLAB column-major ↔ Python
    time-major shape conversions), de Jong/MacKinnon cross-covariance Wku, sufficient
    statistics for both Poisson and binomial CIF links, and the complete-data log-likelihood
    (`-Dx*K/2*log(2π) - K/2*log|Q| - Dy*K/2*log(2π) - K/2*log|R| - Dx/2*log(2π) -
    1/2*log|Px0| + sumPPll - 0.5*tr(Q\sumXkTerms) - 0.5*tr(R\sumYkTerms) - Dx/2`).'
  - Uses `np.linalg.solve` for every MATLAB `B/A` to honour the iter-4 stability rule;
    falls back to `np.linalg.pinv` only when the solve fails.
  - 'Runs end-to-end on synthetic inputs (verified iter 34): returns ExpectationSums
    dict with all 11 fields, finite logll for both poisson and binomial fitType.'
  - '`parity/numerical_drift_spec.yml` entry `PPLFP_EStep` is staged with `todo: true`;
    recipe `pplfp_estep` will be wired in iter 35+ once the fixture lands.'
  fixture_impact: Missing fixture `tests/parity/fixtures/matlab_gold/pplfp_PPLFP_EStep.mat`
    — baseline capture failed during iter-29 baseline phase.
  discovered: iter 34 / 2026-06-18
