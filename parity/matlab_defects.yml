# Edit entries here; then run `python tools/parity/render_ledger.py` to
# regenerate the .md.  Hand-edits to the .md will be overwritten.
#
# Schema:
#   version: integer
#   intro:        free-form markdown shown at the top of the rendered file
#   entries:      list of structured defect records
#   checklist:    free-form markdown shown at the bottom (reviewer checklist)
#
# Defect record schema:
#   id:                 stable kebab-case anchor
#   title:              one-line title
#   defect_class:       Bug | Stability | Efficiency | "Bug (preserved)"
#   matlab_location:    string (file + line in cajigaslab/nSTAT@sha)
