- id: nst2-setmaxtime-preserved
  title: 'Documented MATLAB quirk preserved: nst2.setMaxTime(21) mutates nst2 but
    not nst'
  defect_class: Bug (preserved for exact-mirror parity, not "fixed")
  matlab_location: '`nSTATPaperExamples.m` lines 121-145 (Experiment 2, Explicit Stimulus
    / Whisker Data)'
  matlab_behavior: 'The script copies `nst2 = nst.copy()`, calls `nst2.setMaxTime(21)`,

    then later plots `nst.plot` for the spike raster — the unclipped

    `nst` object is what''s drawn, so MATLAB''s figure 2 top panel shows

    the full ~50.73 s record with ~966 spikes despite the script

    appearing to clip to 21 s.  The stimulus side IS clipped via

    `stim.getSigInTimeWindow(0, 21)`.

    '
  correct_behavior: 'Per the exact-mirror rule, reproduce MATLAB''s actual output.  The

    previous Python port "fixed" what it read as a MATLAB bug by

    clipping the spike train to 21 s in `payload[''spike_indicator'']`,

    which produced ~360 spikes over 0..21 s and diverged from MATLAB.

    '
  python_implementation:
  - '`nstat/paper_examples_full.py:421-432` now exposes both `spike_indicator_full`/`time_s_full`
    (matching MATLAB''s `nst.plot`) and the original 21 s-clipped arrays (used elsewhere
    by the GLM fits).'
  - '`notebooks/ExplicitStimulusWhiskerData.ipynb` cell 4 was updated to draw the
    figure-1 raster and figure-2 top panel from the full-length arrays.  Stimulus
    axes in MATLAB are raw volts (0..9.953 V); the GLM-internal `/10` normalization
    is now kept in `stim` and the raw signal is exposed as `payload[''stimulus_raw_v'']`
