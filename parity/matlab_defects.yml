- id: pplfp-em-driver-hkall-upstream-bug
  title: PPLFP_EM internal HkAll mis-sized — `K = size(dN,1)` should be `size(dN,2)`
  defect_class: Bug (upstream MATLAB, blocks fixture recapture)
  matlab_location: '`+nstat/+decoding/PPLFP.m:1612-1626` in `cajigaslab/nSTAT@main`
    (post-2026-06-19)'
  matlab_behavior: '`PPLFP_EM` line 1611 sets `maxTime=(size(dN,2)-1)*delta` (time
    = dim 2)

    but line 1612 sets `K=size(dN,1)` (numCells = dim 1) then uses K to

    size the internal `HkAll(:,:,k)` loop. This builds `HkAll` of shape

    `(1, 1, numCells)` instead of `(K_time, 1, numCells)`. When the inner

    `PPLFP_EStep` call then indexes `HkAll(:,:,time_index)` with

    `time_index > numCells`, MATLAB throws "Index in position 3 exceeds

    array bounds". The bug also fires through the `if(~isempty(windowTimes))`

    branch because the same `K` symbol is reused.

    '
  correct_behavior: 'Both lines should read `size(dN,2)` — the EStep convention is

    `[numCells, K] = size(dN)`. With this fix, `PPLFP_EM` would run

    end-to-end and the v9-era `pplfp_EM.mat` capture would reproduce.

    v11 iter 49 confirmed the bug is present in the upstream

    `cajigaslab/nSTAT@main` checkout and blocks `pplfp_EM.mat`

    reproduction from any `dN` shape larger than `numCells`. The

    committed `pplfp_EM.mat` is therefore left unchanged (kept from the

    v9 original capture); Python''s `_recipe_pplfp_em` still PASSes drift

    against it at Case-C tolerance.

    '
  python_implementation:
  - '`tools/parity/matlab/export_pplfp_gold_fixtures.m` `export_pplfp_EM_fixture`
    is wrapped in a top-level try/catch; on the upstream EM bug the committed fixture
    is left untouched and a warning is logged.'
  - '`nstat/decoding/PPLFP.py` `PPLFP.PPLFP_EM` is a faithful port but uses the correct
    `K = size(dN, 1)` (Python time-major convention), so Python avoids the bug at
    the cost of not bit-mirroring this MATLAB code path.'
  - '`tools/parity/numerical_drift.py` `_recipe_pplfp_em` (unchanged).'
  fixture_impact: '`tests/parity/fixtures/matlab_gold/pplfp_EM.mat` kept byte-identical

    to the v9 original capture. Drift detector PPLFP_EM unchanged: PASS

    with `max|err|=1.417e-01` against Case-C tolerance

    `rtol=1e+1, atol=1e+0`.

    '
  discovered: iter 49 / 2026-06-19
  upstream_issue: cajigaslab/nSTAT#90
  upstream_status: filed (recapture-blocked at iter 61)
  resolved_in: 'cajigaslab/nSTAT@main (post-2026-06-19, fix for #90)'
  resolved_iter: v11 mini-reconciliation / 2026-06-19
  resolved_notes: 'Upstream merged the K=size(dN,2) fix. pplfp_EM now runs end-to-end
    on rectangular dN. v11 mini-reconciliation confirmed: existing fixture values
    byte-identical (the original capture used numCells==K_time and dodged the bug);
    future recaptures with rectangular dN now succeed.


