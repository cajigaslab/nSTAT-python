version: 1
description: "Method-level input/output behavior contracts for all mapped MATLAB classes"

classes:
  - matlab_class: SignalObj
    python_class: nstat.signal.Signal
    scenario: signal_basic
    contracts:
      - member: n_samples
        access: property
        expect:
          equals: 5
      - member: n_channels
        access: property
        expect:
          equals: 1
      - member: sample_rate_hz
        access: property
        expect:
          approx: 2.0
          abs_tol: 1.0e-12
      - member: duration_s
        access: property
        expect:
          approx: 2.0
          abs_tol: 1.0e-12
      - member: copy
        access: method
        expect:
          instance_of: nstat.signal.Signal

  - matlab_class: Covariate
    python_class: nstat.signal.Covariate
    scenario: covariate_basic
    contracts:
      - member: n_channels
        access: property
        expect:
          equals: 2
      - member: labels
        access: property
        expect:
          equals:
            - stim1
            - stim2

  - matlab_class: ConfidenceInterval
    python_class: nstat.confidence.ConfidenceInterval
    scenario: confidence_basic
    contracts:
      - member: width
        access: method
        expect:
          shape: [5]
          sum_approx: 2.5
          abs_tol: 1.0e-12
      - member: contains
        access: method
        args_key: contains_args
        expect:
          equals:
            - true
            - true
            - true
            - false
            - false

  - matlab_class: Events
    python_class: nstat.events.Events
    scenario: events_basic
    contracts:
      - member: subset
        access: method
        args: [0.0, 0.5]
        expect:
          instance_of: nstat.events.Events
      - member: subset
        access: method
        args: [0.0, 0.5]
        extract: times
        expect:
          equals:
            - 0.1
            - 0.4

  - matlab_class: History
    python_class: nstat.history.HistoryBasis
    scenario: history_basic
    contracts:
      - member: n_bins
        access: property
        expect:
          equals: 3
      - member: design_matrix
        access: method
        args_key: design_args
        expect:
          shape: [4, 3]
          min: 0.0
          sum_approx: 5.0
          abs_tol: 1.0e-12

  - matlab_class: nspikeTrain
    python_class: nstat.spikes.SpikeTrain
    scenario: spike_train_basic
    contracts:
      - member: firing_rate_hz
        access: method
        expect:
          approx: 4.0
          abs_tol: 1.0e-12
      - member: bin_counts
        access: method
        args: [0.1]
        select: 1
        expect:
          shape: [10]
          sum_approx: 4.0
          abs_tol: 1.0e-12
      - member: binarize
        access: method
        args: [0.1]
        select: 1
        expect:
          shape: [10]
          min: 0.0
          max: 1.0

  - matlab_class: nstColl
    python_class: nstat.spikes.SpikeTrainCollection
    scenario: spike_coll_basic
    contracts:
      - member: n_units
        access: property
        expect:
          equals: 2
      - member: to_binned_matrix
        access: method
        kwargs:
          bin_size_s: 0.1
          mode: count
        select: 1
        expect:
          shape: [2, 10]
          sum_approx: 7.0
          abs_tol: 1.0e-12

  - matlab_class: CovColl
    python_class: nstat.trial.CovariateCollection
    scenario: covcoll_basic
    contracts:
      - member: time
        access: property
        expect:
          shape: [5]
      - member: design_matrix
        access: method
        select: 0
        expect:
          shape: [5, 3]
          finite: true

  - matlab_class: TrialConfig
    python_class: nstat.trial.TrialConfig
    scenario: trial_config_basic
    contracts:
      - member: sample_rate_hz
        access: property
        expect:
          approx: 1000.0
          abs_tol: 1.0e-12
      - member: fit_type
        access: property
        expect:
          equals: poisson

  - matlab_class: ConfigColl
    python_class: nstat.trial.ConfigCollection
    scenario: config_coll_basic
    contracts:
      - member: configs
        access: property
        expect:
          length: 2

  - matlab_class: Trial
    python_class: nstat.trial.Trial
    scenario: trial_basic
    contracts:
      - member: aligned_binned_observation
        access: method
        kwargs:
          bin_size_s: 0.1
          unit_index: 0
          mode: count
        select: 1
        expect:
          shape: [10]
          sum_approx: 4.0
          abs_tol: 1.0e-12
      - member: aligned_binned_observation
        access: method
        kwargs:
          bin_size_s: 0.1
          unit_index: 0
          mode: count
        select: 2
        expect:
          shape: [10, 3]

  - matlab_class: CIF
    python_class: nstat.cif.CIFModel
    scenario: cif_basic
    contracts:
      - member: evaluate
        access: method
        args_key: eval_args
        expect:
          shape: [5]
          min: 0.0
          finite: true
      - member: log_likelihood
        access: method
        args_key: ll_args
        expect:
          finite: true

  - matlab_class: Analysis
    python_class: nstat.analysis.Analysis
    scenario: analysis_basic
    contracts:
      - member: fit_glm
        access: method
        kwargs_key: fit_kwargs
        expect:
          instance_of: nstat.fit.FitResult
      - member: fit_glm
        access: method
        kwargs_key: fit_kwargs
        extract: coefficients.0
        expect:
          approx_key: true_beta
          abs_tol_key: binomial_glm.coefficient_abs_tol

  - matlab_class: FitResult
    python_class: nstat.fit.FitResult
    scenario: fit_result_basic
    contracts:
      - member: as_cif_model
        access: method
        expect:
          instance_of: nstat.cif.CIFModel
      - member: predict
        access: method
        args_key: predict_args
        expect:
          shape: [3]
          finite: true
      - member: aic
        access: method
        expect:
          approx: 24.0
          abs_tol: 1.0e-12

  - matlab_class: FitResSummary
    python_class: nstat.fit.FitSummary
    scenario: fit_summary_basic
    contracts:
      - member: best_by_aic
        access: method
        expect:
          instance_of: nstat.fit.FitResult
      - member: best_by_aic
        access: method
        extract: fit_type
        expect:
          equals: binomial

  - matlab_class: DecodingAlgorithms
    python_class: nstat.decoding.DecodingAlgorithms
    scenario: decoding_basic
    contracts:
      - member: compute_spike_rate_cis
        access: method
        args_key: ci_args
        select: 0
        expect:
          shape: [4]
          finite: true
      - member: compute_spike_rate_cis
        access: method
        args_key: ci_args
        select: 2
        expect:
          shape: [4, 4]
      - member: decode_weighted_center
        access: method
        args_key: wc_args
        expect:
          shape: [6]
          min: 0.0
          max: 2.0
