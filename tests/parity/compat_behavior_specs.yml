version: 1
description: "MATLAB-compat method behavior contracts for mapped nSTAT classes"

classes:
  - matlab_class: SignalObj
    python_class: nstat.compat.matlab.SignalObj
    scenario: compat_signal_basic
    contracts:
      - member: time
        access: property
        expect:
          shape: [5]
      - member: data
        access: property
        expect:
          shape: [5]
      - member: getValueAt
        access: method
        args: [1.0]
        expect:
          shape: [1]
          sum_approx: 3.0
          abs_tol: 1.0e-12
      - member: derivative
        access: method
        expect:
          instance_of: nstat.compat.matlab.SignalObj
      - member: integral
        access: method
        extract: 4
        expect:
          approx: 4.0
          abs_tol: 1.0e-12
      - member: copySignal
        access: method
        expect:
          instance_of: nstat.compat.matlab.SignalObj
      - member: resample
        access: method
        args: [4.0]
        extract: n_samples
        expect:
          equals: 9
      - member: shift
        access: method
        args: [0.5]
        extract: time
        expect:
          shape: [5]
      - member: getOriginalData
        access: method
        expect:
          shape: [5]
      - member: getOrigDataSig
        access: method
        expect:
          instance_of: nstat.compat.matlab.SignalObj

  - matlab_class: Covariate
    python_class: nstat.compat.matlab.Covariate
    scenario: compat_covariate_basic
    contracts:
      - member: computeMeanPlusCI
        access: method
        select: 0
        expect:
          shape: [5]
          sum_approx: 2.1875
          abs_tol: 1.0e-12
      - member: getSubSignal
        access: method
        args: [1]
        expect:
          instance_of: nstat.compat.matlab.Covariate
      - member: getSigRep
        access: method
        expect:
          shape: [5, 2]
      - member: isConfIntervalSet
        access: method
        expect:
          equals: false
      - member: copySignal
        access: method
        expect:
          instance_of: nstat.compat.matlab.Covariate
      - member: dataToStructure
        access: method
        expect:
          instance_of: builtins.dict
      - member: fromStructure
        access: method
        args_key: cov_from_structure_args
        expect:
          instance_of: nstat.compat.matlab.Covariate
      - member: plus
        access: method
        args: [0.5]
        extract: data
        expect:
          shape: [5, 2]
          min: 0.5
      - member: minus
        access: method
        args: [0.5]
        extract: data
        expect:
          shape: [5, 2]
          max: 0.5

  - matlab_class: ConfidenceInterval
    python_class: nstat.compat.matlab.ConfidenceInterval
    scenario: compat_confidence_basic
    contracts:
      - member: setColor
        access: method
        args_key: ci_set_color_args
        expect:
          instance_of: nstat.compat.matlab.ConfidenceInterval
      - member: setValue
        access: method
        args_key: ci_set_value_args
        expect:
          instance_of: nstat.compat.matlab.ConfidenceInterval
      - member: fromStructure
        access: method
        args_key: ci_from_structure_args
        expect:
          instance_of: nstat.compat.matlab.ConfidenceInterval

  - matlab_class: Events
    python_class: nstat.compat.matlab.Events
    scenario: compat_events_basic
    contracts:
      - member: toStructure
        access: method
        expect:
          instance_of: builtins.dict
      - member: fromStructure
        access: method
        args_key: events_from_structure_args
        expect:
          instance_of: nstat.compat.matlab.Events

  - matlab_class: History
