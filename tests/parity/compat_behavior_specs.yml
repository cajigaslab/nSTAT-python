        expect:
          shape: [5]
          sum_approx: 2.1875
          abs_tol: 1.0e-12
      - member: getSubSignal
        access: method
        args: [1]
        expect:
          instance_of: nstat.compat.matlab.Covariate
      - member: getSigRep
        access: method
        expect:
          shape: [5, 2]
      - member: isConfIntervalSet
        access: method
        expect:
          equals: false
      - member: copySignal
        access: method
        expect:
          instance_of: nstat.compat.matlab.Covariate
      - member: dataToStructure
        access: method
        expect:
          instance_of: builtins.dict
      - member: fromStructure
        access: method
        args_key: cov_from_structure_args
        expect:
          instance_of: nstat.compat.matlab.Covariate
      - member: setConfInterval
        access: method
        args_key: cov_set_ci_args
        expect:
          instance_of: nstat.compat.matlab.Covariate
      - member: filtfilt
        access: method
        args_key: cov_filter_args
        extract: data
        expect:
          shape: [5, 2]
      - member: plus
        access: method
        args: [0.5]
        extract: data
        expect:
          shape: [5, 2]
          min: 0.5
      - member: minus
        access: method
        args: [0.5]
        extract: data
        expect:
          shape: [5, 2]
