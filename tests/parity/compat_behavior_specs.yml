          abs_tol: 1.0e-12
      - member: getNSTnames
        access: method
        expect:
          equals:
            - u1
            - u2
      - member: getNSTIndicesFromName
        access: method
        args_key: coll_name_args
        expect:
          equals:
            - 0
      - member: getNSTnameFromInd
        access: method
        args_key: coll_ind_args
        expect:
          equals: u2
      - member: getNSTFromName
        access: method
        args_key: coll_name_args
        expect:
          instance_of: nstat.compat.matlab.nspikeTrain
      - member: getNST
        access: method
        args_key: coll_ind_args
        expect:
          instance_of: nstat.compat.matlab.nspikeTrain
      - member: dataToMatrix
        access: method
        args_key: coll_binned_args
        expect:
          shape: [2, 10]
          sum_approx: 7.0
          abs_tol: 1.0e-12
      - member: to_binned_matrix
        access: method
        args: [0.1]
        kwargs:
          mode: count
        select: 1
        expect:
          shape: [2, 10]
          sum_approx: 7.0
          abs_tol: 1.0e-12
      - member: getSpikeTimes
        access: method
        expect:
          length: 2
      - member: getMinISIs
        access: method
        expect:
          shape: [2]
          min: 0.049
      - member: findMaxSampleRate
        access: method
        expect:
          approx: 20.0
          abs_tol: 1.0e-9
      - member: toStructure
        access: method
        expect:
          instance_of: builtins.dict
      - member: fromStructure
        access: method
        args_key: coll_from_structure_args
        expect:
          instance_of: nstat.compat.matlab.nstColl

