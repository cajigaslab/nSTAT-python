version: 1
description: "MATLAB-compat method behavior contracts for mapped nSTAT classes"

classes:
  - matlab_class: SignalObj
    python_class: nstat.compat.matlab.SignalObj
    scenario: compat_signal_basic
    contracts:
      - member: time
        access: property
        expect:
          shape: [5]
      - member: data
        access: property
        expect:
          shape: [5]
      - member: getValueAt
        access: method
        args: [1.0]
        expect:
          shape: [1]
          sum_approx: 3.0
          abs_tol: 1.0e-12
      - member: derivative
        access: method
        expect:
          instance_of: nstat.compat.matlab.SignalObj
      - member: integral
        access: method
        extract: 4
        expect:
          approx: 4.0
          abs_tol: 1.0e-12
      - member: copySignal
        access: method
        expect:
          instance_of: nstat.compat.matlab.SignalObj
      - member: resample
        access: method
        args: [4.0]
        extract: n_samples
        expect:
          equals: 9
      - member: shift
        access: method
        args: [0.5]
        extract: time
        expect:
          shape: [5]
      - member: getOriginalData
        access: method
        expect:
          shape: [5]
      - member: getOrigDataSig
        access: method
        expect:
          instance_of: nstat.compat.matlab.SignalObj
      - member: setUnits
        access: method
        args: [spikes/sec]
        expect:
          instance_of: nstat.compat.matlab.SignalObj
      - member: setPlotProps
        access: method
        args_key: signal_plot_props_args
        expect:
          instance_of: nstat.compat.matlab.SignalObj
      - member: setXUnits
        access: method
        args: [s]
        expect:
          instance_of: nstat.compat.matlab.SignalObj
      - member: setYUnits
        access: method
        args: [Hz]
        expect:
          instance_of: nstat.compat.matlab.SignalObj
      - member: setDataLabels
        access: method
        args_key: signal_labels_args
        expect:
          instance_of: nstat.compat.matlab.SignalObj
      - member: getIndexFromLabel
        access: method
        args_key: signal_index_arg
        expect:
          equals: 0
      - member: getIndicesFromLabels
        access: method
        args_key: signal_label_lookup_args
        expect:
          equals:
            - 0
      - member: convertNamesToIndices
        access: method
        args_key: signal_label_lookup_args
        expect:
          equals:
            - 0
      - member: plus
        access: method
        args: [1.0]
        extract: data
        expect:
          shape: [5, 1]
          min: 2.0
      - member: minus
        access: method
        args: [1.0]
        extract: data
        expect:
          shape: [5, 1]
          max: 2.0
      - member: times
        access: method
        args: [2.0]
        extract: data
        expect:
          shape: [5, 1]
          max: 6.0
      - member: mtimes
        access: method
        args: [2.0]
        extract: data
        expect:
          shape: [5, 1]
          max: 6.0
      - member: rdivide
        access: method
        args: [2.0]
        extract: data
        expect:
          shape: [5, 1]
          max: 1.5
      - member: ldivide
        access: method
        args: [2.0]
        extract: data
        expect:
          shape: [5, 1]
          min: 0.6666666
      - member: power
        access: method
        args: [2.0]
        extract: data
        expect:
          shape: [5, 1]
          max: 9.0
      - member: derivativeAt
        access: method
        args: [1.0]
        expect:
          shape: [1]
      - member: findNearestTimeIndex
        access: method
        args: [1.0]
        expect:
          equals: 1
      - member: findNearestTimeIndices
        access: method
        args_key: signal_times_args
        expect:
          equals:
            - 0
            - 1
            - 3
      - member: getSigInTimeWindow
        access: method
        args_key: signal_time_window_args
        extract: n_samples
        expect:
          equals: 3
      - member: merge
        access: method
        args_key: signal_other_shifted_args
        extract: n_channels
        expect:
          equals: 2
      - member: makeCompatible
        access: method
        args_key: signal_other_args
        select: 0
        extract: n_samples
        expect:
          equals: 4
      - member: shiftMe
        access: method
        args: [0.25]
        extract: time
        expect:
          shape: [5]
      - member: setDataMask
        access: method
        args_key: signal_mask_args
        expect:
          instance_of: nstat.compat.matlab.SignalObj
      - member: setMaskByInd
        access: method
        args_key: signal_mask_args
        expect:
          instance_of: nstat.compat.matlab.SignalObj
      - member: setMaskByLabels
        access: method
        args_key: signal_names_args
        expect:
          instance_of: nstat.compat.matlab.SignalObj
      - member: getSubSignalFromNames
        access: method
        args_key: signal_names_args
        extract: n_channels
        expect:
          equals: 1
      - member: filter
        access: method
        args_key: signal_filter_args
        expect:
          instance_of: nstat.compat.matlab.SignalObj
      - member: filtfilt
        access: method
        args_key: signal_filter_args
        expect:
          instance_of: nstat.compat.matlab.SignalObj
      - member: crosscorrelation
        access: method
        args_key: signal_crosscorr_args
        select: 0
        expect:
          equals:
            - -1
            - 0
            - 1
      - member: getPlotProps
        access: method
        expect:
          equals:
            LineWidth: 2.0
      - member: plotPropsSet
        access: method
        expect:
          equals: true
      - member: areDataLabelsEmpty
        access: method
        expect:
          equals: false
      - member: isLabelPresent
        access: method
        args: [ch1]
        expect:
          equals: true
      - member: dataToMatrix
        access: method
        expect:
          shape: [5, 1]
          sum_approx: 9.0
          abs_tol: 1.0e-12
      - member: getSubSignal
        access: method
        args: [0]
        expect:
          instance_of: nstat.compat.matlab.SignalObj
      - member: getSubSignalFromInd
        access: method
        args:
          - [0]
        expect:
          instance_of: nstat.compat.matlab.SignalObj
      - member: alignToMax
        access: method
        extract: time
        expect:
          shape: [5]
          min: -1.0
          max: 1.0
      - member: findGlobalPeak
        access: method
        select: 0
        expect:
          approx: 3.0
          abs_tol: 1.0e-12
      - member: findGlobalPeak
        access: method
        select: 1
        expect:
          approx: 0.0
          abs_tol: 1.0e-12
      - member: findGlobalPeak
        access: method
        select: 2
        expect:
          equals: 2
      - member: findPeaks
        access: method
        select: 0
        expect:
          shape: [1]
          sum_approx: 0.0
          abs_tol: 1.0e-12
      - member: findPeaks
        access: method
        select: 1
        expect:
          shape: [1]
          sum_approx: 3.0
          abs_tol: 1.0e-12
      - member: findMinima
        access: method
        select: 0
        expect:
          shape: [0]
      - member: findMinima
        access: method
        select: 1
        expect:
          shape: [0]
      - member: setName
        access: method
        args: [sig_updated]
        expect:
          instance_of: nstat.compat.matlab.SignalObj
      - member: setXlabel
        access: method
        args: [time]
        expect:
          instance_of: nstat.compat.matlab.SignalObj
      - member: setYLabel
        access: method
        args: [value]
        expect:
          instance_of: nstat.compat.matlab.SignalObj
      - member: setSampleRate
        access: method
        args: [4.0]
        extract: n_samples
        expect:
          equals: 9
      - member: setMinTime
        access: method
        args: [0.0]
        expect:
          instance_of: nstat.compat.matlab.SignalObj
      - member: setMaxTime
        access: method
        args: [2.0]
        expect:
          instance_of: nstat.compat.matlab.SignalObj
      - member: setMask
        access: method
        args_key: signal_mask_args
        expect:
          instance_of: nstat.compat.matlab.SignalObj
      - member: isMaskSet
        access: method
        expect:
          equals: false
      - member: uplus
        access: method
        expect:
          instance_of: nstat.compat.matlab.SignalObj
      - member: uminus
        access: method
        expect:
          instance_of: nstat.compat.matlab.SignalObj
      - member: sqrt
        access: method
        expect:
          instance_of: nstat.compat.matlab.SignalObj
      - member: ctranspose
        access: method
        expect:
          instance_of: nstat.compat.matlab.SignalObj
      - member: transpose
        access: method
        expect:
          instance_of: nstat.compat.matlab.SignalObj
      - member: abs
        access: method
        expect:
          instance_of: nstat.compat.matlab.SignalObj
      - member: log
        access: method
        expect:
          instance_of: nstat.compat.matlab.SignalObj
      - member: median
        access: method
        expect:
          finite: true
      - member: mode
        access: method
        expect:
          finite: true
      - member: mean
        access: method
        expect:
          finite: true
      - member: std
        access: method
        expect:
          finite: true
      - member: max
        access: method
        expect:
          finite: true
      - member: min
        access: method
        expect:
          finite: true
      - member: autocorrelation
        access: method
        expect:
          length: 2
      - member: periodogram
        access: method
        expect:
          length: 2
      - member: MTMspectrum
        access: method
        expect:
          length: 2
      - member: spectrogram
        access: method
        expect:
          length: 3
      - member: xcorr
        access: method
        expect:
          length: 2
      - member: xcov
        access: method
        expect:
          length: 2
      - member: resampleMe
        access: method
        args: [4.0]
        expect:
          instance_of: nstat.compat.matlab.SignalObj
      - member: restoreToOriginal
        access: method
        extract: n_samples
        expect:
          equals: 5
      - member: resetMask
        access: method
        expect:
          instance_of: nstat.compat.matlab.SignalObj
      - member: findIndFromDataMask
        access: method
        expect:
          equals:
            - 0
      - member: alignTime
        access: method
        args: [0.1]
        extract: time
        expect:
          shape: [5]
      - member: findMaxima
        access: method
        select: 0
        expect:
          shape: [1]
      - member: clearPlotProps
        access: method
        expect:
          instance_of: nstat.compat.matlab.SignalObj
      - member: dataToStructure
        access: method
        expect:
          length: 9
      - member: windowedSignal
        access: method
        args: [3]
        expect:
          instance_of: nstat.compat.matlab.SignalObj
      - member: normWindowedSignal
        access: method
        args: [3]
        expect:
          instance_of: nstat.compat.matlab.SignalObj
      - member: getSubSignalsWithinNStd
        access: method
        args: [1.0]
        expect:
          instance_of: nstat.compat.matlab.SignalObj
      - member: plot
        access: method
        expect:
          length: 1
      - member: setupPlots
        access: method
        expect:
          instance_of: nstat.compat.matlab.SignalObj
      - member: plotVariability
        access: method
        expect:
          instance_of: matplotlib.collections.PolyCollection
      - member: plotAllVariability
        access: method
        expect:
          instance_of: matplotlib.collections.PolyCollection
      - member: signalFromStruct
        access: method
        args_key: signal_from_structure_args
        expect:
          instance_of: nstat.compat.matlab.SignalObj
      - member: convertSigStructureToStructure
        access: method
        args_key: signal_from_structure_args
        expect:
          length: 9
      - member: convertSimpleStructureToSigStructure
        access: method
        args_key: signal_from_structure_args
        expect:
          length: 9
      - member: getAvailableColor
        access: method
        expect:
          equals: b
      - member: cell2str
        access: method
        args_key: signal_cell2str_args
        expect:
          equals: a,b,c

  - matlab_class: Covariate
