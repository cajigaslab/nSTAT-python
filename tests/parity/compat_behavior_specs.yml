      - member: toStructure
        access: method
        expect:
          instance_of: builtins.dict
      - member: fromStructure
        access: method
        args_key: spike_from_structure_args
        expect:
          instance_of: nstat.compat.matlab.nspikeTrain

  - matlab_class: nstColl
