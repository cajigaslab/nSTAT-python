version: 1
extras:
  - demo_id: decoding_clusterless
    name: decoding_clusterless_demo
    script: examples/extras/decoding_clusterless_demo.py
    title: Clusterless point-process decoding + trajectory classification
    question: Does the JAX-backed clusterless replay decoder reproduce the PPAF/PPHF state-space decode on synthetic 1-D marks?
    description: |
      Exercises ``nstat.extras.decoding.clusterless_bridge`` end-to-end on a
      synthetic 1-D back-and-forth trajectory with sparse Poisson marks.  Runs
      both the continuous ``fit_clusterless_decoder`` and the
      discrete-state ``fit_clusterless_classifier`` (Denovellis 2021, eLife).
    figures: []

  - demo_id: decoding_place_field
    name: decoding_place_field_demo
    script: examples/extras/decoding_place_field_demo.py
    title: 2-D place-field encoding + PPAF decoding via ``fit_place_field_decoder``
    question: Can the example08 pipeline (B-spline encoder + quadratic CIF refit + PPDecodeFilterLinear) recover an OU random walk from a 3-cell synthetic trial without figshare data?
    description: |
      Mirrors the canonical example08 pipeline on a fully-synthetic 3-cell
      place-cell trial — no figshare data, no opt-deps beyond core ``nstat``.
      Plots the decoded trajectory and the recovered place-field summary.
    figures:
      - filename: fig01_decoded_trajectory.png
      - filename: fig02_place_fields.png

  - demo_id: em_dynamax
    name: em_dynamax_demo
    script: examples/extras/em_dynamax_demo.py
    title: KF_EM / PP_EM / mPPCO_EM equivalents via the Dynamax bridge
    question: Do the JAX-backed EM routines recover the AUDIT_REPORT.md §3.2 KF_EM / PP_EM / mPPCO_EM workflow on synthetic linear-Gaussian, Poisson, and hybrid fixtures?
    description: |
      Exercises every routine in ``nstat.extras.em.dynamax_bridge`` —
      linear-Gaussian EM, point-process filter/smoother, point-process EM,
      hybrid Poisson+Gaussian EM, and a pure-NumPy held-out predictive
      log-likelihood.  Closes the AUDIT_REPORT.md §3.2 gap (19 unported
      MATLAB methods).
    figures: []

  - demo_id: interop_neo
    name: interop_neo_demo
    script: examples/extras/interop_neo_demo.py
    title: nstat ↔ Neo round-trip and Segment construction
    question: Does ``nspikeTrain`` round-trip through ``neo.core.SpikeTrain`` preserving spike times, recording window, and name, and can a ``SpikeTrainCollection`` be packaged as a ``neo.core.Segment`` for Elephant / SpikeInterface?
    description: |
      Demonstrates :mod:`nstat.extras.interop.neo`: converts an
      :class:`nstat.nspikeTrain` to :class:`neo.core.SpikeTrain`,
      round-trips back, and builds a :class:`neo.core.Segment` from a
      :class:`SpikeTrainCollection` for downstream consumption.
    figures: []

  - demo_id: interop_pynapple
    name: interop_pynapple_demo
    script: examples/extras/interop_pynapple_demo.py
    title: nstat ↔ pynapple round-trip with IntervalSet epoch math
    question: Does the pynapple bridge round-trip a ``nspikeTrain`` through ``pynapple.Ts`` and preserve the recording window when ``IntervalSet`` epoch restriction is composed?
    description: |
      Demonstrates :mod:`nstat.extras.interop.pynapple`: converts to
      :class:`pynapple.Ts` with the recording-window
      :class:`pynapple.IntervalSet`, restricts to a sub-epoch using
      pynapple's epoch math, and converts back with the sub-epoch as
      support.
    figures: []

  - demo_id: interop_nwb
    name: interop_nwb_demo
    script: examples/extras/interop_nwb_demo.py
    title: Read an NWB file into a ``SpikeTrainCollection``
    question: Does the NWB bridge resolve per-unit observation windows from ``obs_intervals`` and honour an explicit ``time_window=`` override?
    description: |
      Builds a synthetic in-memory NWB file (so the demo runs without any
      on-disk data) and converts its ``units`` table to nstat primitives
      using both the ``obs_intervals`` resolution path and the explicit
      ``time_window=(t0, t1)`` override that silences the fallback
      warning.
    figures: []

  - demo_id: latents_gpfa
    name: latents_gpfa_demo
    script: examples/extras/latents_gpfa_demo.py
    title: Gaussian-Process Factor Analysis (Yu et al. 2009) via the Elephant bridge
    question: Does the Elephant-backed GPFA bridge recover a known shared 2-D smooth latent from 4 multi-trial Poisson populations?
    description: |
      End-to-end exercise of :mod:`nstat.extras.latents.gpfa_bridge`:
      simulates 4 multi-trial Poisson-spike datasets driven by a shared
      2-D smooth latent (two sinusoids), fits GPFA with ``x_dim=2``,
      and reports the best |Pearson r| of any recovered latent vs the
      ground truth.
    figures:
      - filename: fig01_latent_trajectories.png

  - demo_id: metrics_spike_distances
    name: metrics_spike_distances_demo
    script: examples/extras/metrics_spike_distances_demo.py
    title: ISI / SPIKE / SPIKE-synchronization metrics on a 5-train population
    question: Do the PySpike-backed pairwise spike-distance metrics agree on a 5-train inhomogeneous-Poisson population with shared rate modulation?
    description: |
      Generates 5 inhomogeneous-Poisson spike trains with shared rate
      modulation (so they're partially synchronous), then computes the
      pairwise SPIKE-distance matrix via PySpike.  Exercises
      :func:`isi_distance`, :func:`spike_distance`,
      :func:`spike_synchronization`, and
      :func:`pairwise_spike_distance_matrix`.
    figures: []

  - demo_id: spatial_cluster_cox
    name: spatial_cluster_cox_demo
    script: examples/extras/spatial_cluster_cox_demo.py
    title: Cluster Cox processes + minimum-contrast estimation
    question: Can the Diggle 2013 minimum-contrast estimator recover the offspring scale and parent intensity of a simulated Thomas / Matérn-cluster process on the unit square?
    description: |
      Simulates Thomas (Gaussian offspring) and Matérn-cluster (uniform-disc
      offspring) processes, then recovers ``(sigma, lambda_p)`` and
      ``(R, lambda_p)`` from each via the SOIRS-pair-correlation
      minimum-contrast estimator in :mod:`nstat.extras.spatial`.
    figures:
      - filename: fig01_thomas_scatter.png
      - filename: fig02_thomas_pcf.png
      - filename: fig03_matern_scatter.png
      - filename: fig04_matern_pcf.png

  - demo_id: spatial_gibbs
    name: spatial_gibbs_demo
    script: examples/extras/spatial_gibbs_demo.py
    title: Gibbs interaction processes + Berman-Turner pseudo-likelihood
    question: Can the Berman-Turner pseudo-likelihood recover ``(beta, gamma)``, ``beta``, and ``(beta, eta)`` for Strauss, hard-core, and area-interaction processes simulated by birth-death and rejection samplers?
    description: |
      Simulates Strauss (mild inhibition), hard-core (deliberately set at
      ``beta = 60`` to stay inside the Berman-Turner numerical envelope),
      and area-interaction (clustering) processes on the unit square,
      then recovers each parameter set via
      :func:`nstat.extras.spatial.pseudo_likelihood_fit`.
    figures:
      - filename: fig01_strauss_scatter.png
      - filename: fig02_hardcore_scatter.png
      - filename: fig03_area_interaction_scatter.png

  - demo_id: validation_nemos
    name: validation_nemos_demo
    script: examples/extras/validation_nemos_demo.py
    title: Cross-validate nstat's Poisson GLM against NeMoS
    question: Do ``nstat.fit_poisson_glm`` and ``nemos.glm.GLM`` agree on the recovered Poisson-GLM coefficients for a known synthetic fixture?
    description: |
      Generates a synthetic Poisson spike-count fixture with known
      coefficients, fits the same model in :func:`nstat.fit_poisson_glm`
      and :class:`nemos.glm.GLM`, then exercises
      :meth:`GLMComparison.assert_agree` — the regression-guard hook for
      parity tests.
    figures: []

  - demo_id: validation_pykalman
    name: validation_pykalman_demo
    script: examples/extras/validation_pykalman_demo.py
    title: Cross-validate nstat's Kalman filter against pykalman
    question: How closely do nstat's Kalman filter and augmented-state lag smoother match pykalman's filter and full-window RTS smoother on a 2-state linear-Gaussian fixture?
    description: |
      Simulates a 2-state linear-Gaussian process, fits the Kalman
      filter (and lag-``(T-1)`` augmented-state smoother) in both nstat
      and pykalman, and surfaces the documented ~2.6e-3 filtered-mean
      and ~0.4 smoothed-mean disagreement (AUDIT D3) via
      :meth:`KalmanComparison.assert_filtered_agree` and
      :meth:`assert_smoothed_agree`.
    figures: []

  - demo_id: validation_statsmodels
    name: validation_statsmodels_demo
    script: examples/extras/validation_statsmodels_demo.py
    title: Cross-validate nstat's Poisson GLM against statsmodels
    question: How tightly do nstat's IRLS Poisson GLM and statsmodels's IRLS Poisson GLM agree on a synthetic well-conditioned fixture?
    description: |
      Both nstat and statsmodels run IRLS (unlike NeMoS's optax-driven
      first-order optimizer), so the recovered coefficients should agree
      to near machine precision (~1e-9 on the synthetic fixture).  This
      is the tightest cross-validation oracle in
      :mod:`nstat.extras.validation`.
    figures: []
