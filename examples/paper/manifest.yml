version: 1
examples:
  - example_id: example01
    name: example01_mepsc_poisson
    script: examples/paper/example01_mepsc_poisson.py
    matlab_source: examples/paper/example01_mepsc_poisson.m
    title: mEPSC Poisson Models Under Constant and Washout Magnesium
    question: Does Mg2+ washout produce firing-rate dynamics beyond a constant Poisson baseline?
    description: Fits constant and piecewise Poisson GLM baselines to mEPSC spike trains.
    sections:
      - experiment1
    figure_files:
      - docs/figures/example01/fig01_constant_mg_summary.png
      - docs/figures/example01/fig02_washout_raster_overview.png
      - docs/figures/example01/fig03_piecewise_baseline_comparison.png
  - example_id: example02
    name: example02_whisker_stimulus_thalamus
    script: examples/paper/example02_whisker_stimulus_thalamus.py
    matlab_source: examples/paper/example02_whisker_stimulus_thalamus.m
    title: Whisker Stimulus GLM With Lag and History Selection
    question: What stimulus lag and history order best explain whisker-evoked spike trains?
    description: Fits explicit-stimulus point-process GLMs and compares baseline, stimulus, and history models.
    sections:
      - experiment2
    figure_files:
      - docs/figures/example02/fig01_data_overview.png
      - docs/figures/example02/fig02_lag_and_model_comparison.png
  - example_id: example03
    name: example03_psth_and_ssglm
    script: examples/paper/example03_psth_and_ssglm.py
    matlab_source: examples/paper/example03_psth_and_ssglm.m
    title: PSTH and SSGLM Dynamics Example
    question: How do PSTH and SSGLM differ in capturing trial learning dynamics?
    description: Bundles simulated PSTH and SSGLM examples from the canonical paper workflow.
    sections:
      - experiment3
      - experiment3b
    figure_files:
      - docs/figures/example03/fig01_simulated_and_real_rasters.png
      - docs/figures/example03/fig02_psth_comparison.png
      - docs/figures/example03/fig03_ssglm_simulation_summary.png
      - docs/figures/example03/fig04_ssglm_fit_diagnostics.png
      - docs/figures/example03/fig05_stimulus_effect_surfaces.png
      - docs/figures/example03/fig06_learning_trial_comparison.png
  - example_id: example04
    name: example04_place_cells_continuous_stimulus
    script: examples/paper/example04_place_cells_continuous_stimulus.py
    matlab_source: examples/paper/example04_place_cells_continuous_stimulus.m
    title: Place-Cell Receptive Fields (Gaussian vs Zernike)
    question: How do Gaussian and Zernike basis models compare for place-field mapping?
    description: Loads place-cell datasets and compares receptive-field model families.
    sections:
      - experiment4
    figure_files:
      - docs/figures/example04/fig01_example_cells_path_overlay.png
      - docs/figures/example04/fig02_model_summary_statistics.png
      - docs/figures/example04/fig03_gaussian_place_fields_animal1.png
      - docs/figures/example04/fig04_zernike_place_fields_animal1.png
      - docs/figures/example04/fig05_gaussian_place_fields_animal2.png
      - docs/figures/example04/fig06_zernike_place_fields_animal2.png
      - docs/figures/example04/fig07_example_cell_mesh_comparison.png
  - example_id: example05
    name: example05_decoding_ppaf_pphf
    script: examples/paper/example05_decoding_ppaf_pphf.py
    matlab_source: examples/paper/example05_decoding_ppaf_pphf.m
    title: Stimulus Decoding With PPAF and PPHF
    question: How accurately can neural populations decode latent stimulus and reach state?
    description: Bundles univariate, reaching, and hybrid decoding examples from the paper workflow.
    sections:
      - experiment5
      - experiment5b
      - experiment6
    figure_files:
      - docs/figures/example05/fig01_univariate_setup.png
      - docs/figures/example05/fig02_univariate_decoding.png
      - docs/figures/example05/fig03_reach_and_population_setup.png
      - docs/figures/example05/fig04_ppaf_goal_vs_free.png
      - docs/figures/example05/fig05_hybrid_setup.png
      - docs/figures/example05/fig06_hybrid_decoding_summary.png
